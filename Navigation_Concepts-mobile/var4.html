<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept: Cyber Line Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rubik', sans-serif; }
        header { 
            /* Změněno na lokální soubor bg.jpg ve stejném adresáři */
            background: #020512 url('bg.jpg') no-repeat center top;
        }

        body {
            background-color: #96989e;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 75px; }
        .left-zone { display: flex; align-items: center; gap: 40px; }
        .logo img { height: 44px; display: block; }
        
        /* Hlavní navigace a její hover efekty */
        .hub-nav { display: flex; gap: 10px; list-style: none; }
        .hub-nav a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 700; 
            padding: 8px 22px; 
            border-radius: 20px; 
            transition: all 0.25s ease;
        }
        
        /* Cyber hover pro neaktivní položky hlavního menu */
        .hub-nav li:not(.active) a:hover {
            background-color: rgba(255, 255, 255, 0.06);
            color: #ffbe00;
            box-shadow: 0 0 15px rgba(255, 190, 0, 0.15);
        }

        .hub-nav .active a { background-color: #ffbe00; color: #020617; }
        
        .auth-zone { display: flex; gap: 15px; }
        .btn { display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 20px;
            border-radius: 21px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none; }
        .btn-login { background: #fff; color: #020617; }
        .btn-register { background: #ffbe00; color: #020617; }

        /* ==========================================================================
           CYBER LINE TRACE (SUBMENU)
           ========================================================================== */
        .trace-deck {
            margin-top: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18); /* Nekonečná tenká linka */
            position: relative;
        }

        .trace-menu {
            display: flex;
            list-style: none;
            padding: 0 40px;
            gap: 10px;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        /* Třída pro plynulý přechod menu při přepnutí */
        .trace-menu.fade-out {
            opacity: 0;
        }

        .trace-item {
            position: relative;
            padding-bottom: 15px; /* Vytváří ideální mezeru nad linkou */
        }

        .trace-item a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            transition: all 0.25s ease;
        }

        /* Hover stav prosvětlí text */
        .trace-item:hover a {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Aktivní stav rozsvítí spodní linku jako laser a aktivuje křížek */
        .trace-item.active a {
            color: #ffbe00;
            font-weight: 700;
        }
        .trace-item.active::before {
            opacity: 1;
            top: -6px;
        }

        /* Lokální intenzivní podsvícení linky pod aktivním prvkem */
        .trace-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 100%; height: 2px;
            background: #ffbe00;
            box-shadow: 0 0 12px #ffbe00;
        }
    </style>
</head>
<body>

    <header class="trace-header">
        <div class="top-bar">
            <div class="left-zone">
                <a href="#" class="logo"><img src="logo.svg" alt="Forbes"></a>
                <ul class="hub-nav">
                    <li class="active" id="tabSport"><a href="#" onclick="switchTo('sport', event)">Sportovní sázení</a></li>
                    <li id="tabCasino"><a href="#" onclick="switchTo('casino', event)">Casino</a></li>
                </ul>
            </div>
            <div class="auth-zone">
                <a href="#" class="btn btn-login">Přihlásit se</a>
                <a href="#" class="btn btn-register">Registrace</a>
            </div>
        </div>

        <div class="trace-deck">
            <nav>
                <ul class="trace-menu" id="traceMenu">
                </ul>
            </nav>
        </div>
    </header>

    <script>
        // Data převzatá přesně ze vzorové stránky
        const menus = {
            casino: [
                { label: 'Domů' },
                { label: 'Bonusy' },
                { label: 'Levelovací systém' },
                { label: 'Cashback' },
                { label: 'Turnaje' },
                { label: 'Blog' },
            ],
            sport: [
                { label: 'Domů' },
                { label: 'Živě' },
                { label: 'Soutěže' },
                { label: 'Bonusy' },
            ],
        };

        let activeProduct = 'sport';

        // Vykreslení položek v submenu
        function renderMenu(product) {
            const menuEl = document.getElementById('traceMenu');
            menuEl.innerHTML = menus[product].map((item, i) => {
                return `<li class="trace-item${i === 0 ? ' active' : ''}">
                        <a href="#" onclick="activateItem(this, event)">${item.label}</a>
                    </li>`;
            }).join('');
        }

        // Aktivace položky uvnitř submenu (klik na "Live", "Bonusy" atd.)
        function activateItem(el, e) {
            e.preventDefault();
            document.querySelectorAll('#traceMenu .trace-item').forEach(li => li.classList.remove('active'));
            el.closest('.trace-item').classList.add('active');
        }

        // Přepínání mezi hlavními taby (Sport / Casino)
        function switchTo(product, e) {
            if (e) e.preventDefault();
            if (product === activeProduct) return;
            activeProduct = product;

            // Přepnutí active třídy na hlavních tabech
            document.getElementById('tabSport').classList.toggle('active', product === 'sport');
            document.getElementById('tabCasino').classList.toggle('active', product === 'casino');

            // Plynulá fade animace pro změnu submenu
            const menuEl = document.getElementById('traceMenu');
            menuEl.classList.add('fade-out');
            
            setTimeout(() => {
                renderMenu(product);
                menuEl.classList.remove('fade-out');
            }, 200);
        }

        // Prvotní inicializace po načtení stránky
        renderMenu('sport');
    </script>

</body>
</html>
