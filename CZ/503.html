<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    .cms-503-page *,
    .cms-503-page *::before,
    .cms-503-page *::after {
        box-sizing: border-box;
    }

    .cms-503-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #ffffff;
        padding: 20px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    .cms-503-logo {
        margin-bottom: 40px;
    }

    /* Upraveno pro SVG kód */
    .cms-503-logo svg {
        height: 78px;
        width: auto;
        filter: brightness(0) invert(1) drop-shadow(0 2px 16px rgba(245, 179, 12, 0.45));
    }

    .cms-503-icon-outer {
        width: 100px;
        height: 100px;
        margin: 0 auto 32px;
        position: relative;
    }

    .cms-503-icon-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid #f5b30c;
        border-top-color: transparent;
        animation: cms503Spin 3s linear infinite;
    }

    .cms-503-icon-inner {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: rgba(245, 179, 12, 0.08);
        border: 2px solid rgba(245, 179, 12, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        position: relative;
        z-index: 1;
    }

    @keyframes cms503Spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes cms503PulseGlow {

        0%,
        100% {
            box-shadow: 0 0 0 0 rgba(245, 179, 12, 0);
        }

        50% {
            box-shadow: 0 0 28px 6px rgba(245, 179, 12, 0.22);
        }
    }

    .cms-503-card {
        background: rgba(13, 28, 66, 0.78);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(245, 179, 12, 0.22);
        border-radius: 16px;
        max-width: 560px;
        width: 100%;
        padding: 52px 48px 44px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }

    .cms-503-badge {
        display: inline-block;
        background: linear-gradient(90deg, #f5b30c, #c98f00);
        color: #0d1c42;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 20px;
        margin-bottom: 20px;
    }

    .cms-503-title {
        font-size: clamp(24px, 5vw, 34px);
        font-weight: 800;
        line-height: 1.2;
        margin: 0 0 14px 0;
        color: #ffffff;
    }

    .cms-503-title-accent {
        background: linear-gradient(90deg, #f5b30c, #c98f00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .cms-503-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.65;
        margin: 0 0 36px 0;
    }

    .cms-503-progress-wrap {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        height: 6px;
        overflow: hidden;
        margin-bottom: 36px;
    }

    .cms-503-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #c98f00, #f5b30c);
        border-radius: 8px;
        animation: cms503Progress 4s ease-in-out infinite alternate;
    }

    @keyframes cms503Progress {
        from {
            width: 15%;
        }

        to {
            width: 90%;
        }
    }

    .cms-503-info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 36px;
    }

    .cms-503-info-item {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 14px 16px;
        text-align: left;
    }

    .cms-503-info-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #f5b30c;
        margin-bottom: 4px;
    }

    .cms-503-info-value {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
    }

    .cms-503-btn-primary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, #f5b30c, #c98f00);
        color: #0d1c42;
        font-size: 15px;
        font-weight: 700;
        padding: 14px 36px;
        border-radius: 10px;
        text-decoration: none;
        margin-bottom: 12px;
        box-shadow: 0 4px 18px rgba(245, 179, 12, 0.35);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .cms-503-btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(245, 179, 12, 0.45);
    }


    .cms-503-foot {
        margin-top: 32px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.35);
    }

    .cms-503-foot a {
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
    }

    .cms-503-foot a:hover {
        color: #f5b30c;
    }

    @media (max-width: 480px) {
        .cms-503-card {
            padding: 36px 20px 28px;
        }

        .cms-503-info-grid {
            grid-template-columns: 1fr;
        }
    }
