<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes Casino Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: auto;
        }

        body {
            width: 300px;
            min-height: 250px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        }

        .banner {
            width: 300px;
            height: 250px;
            flex: 0 0 auto;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #f8f8f8 0%, #f0f0f0 50%, #e8e8e8 100%);
        }



        .yellow-wedge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FEEB15 0%, #F5B30C 100%);
            clip-path: polygon(0 60%, 100% 35%, 100% 100%, 0 100%);
            z-index: 1;
        }

        .crown-pattern-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .crown-pattern {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;

            /* Použijeme stejné SVG dvakrát */
            background-image: url('korunka.svg'), url('korunka.svg');
            background-repeat: repeat;

            /* Nastavíme pevnou velikost dlaždice (např. 60px) */
            background-size: 60px 60px;

            /* První vrstva je na 0 0, druhá je posunutá o polovinu velikosti (20px) */
            background-position: 0 0, 30px 30px;

            opacity: 0.04;
            /* Rotace zajistí ten šikmý efekt z obrázku */
            transform: rotate(15deg);
        }

        .crown-shimmer {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-image: url('korunka.svg'), url('korunka.svg');
            background-repeat: repeat;
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            filter: sepia(1) saturate(6) hue-rotate(5deg) brightness(2.2);
            opacity: 0.5;
            transform: rotate(15deg);
            mask-image: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.9) 50%, transparent 75%);
            -webkit-mask-image: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.9) 50%, transparent 75%);
            mask-size: 250% 100%;
            -webkit-mask-size: 250% 100%;
            mask-position: -150% 0;
            -webkit-mask-position: -150% 0;
            animation: crown-shimmer-wave 6s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        @keyframes crown-shimmer-wave {
            0%   { mask-position: -150% 0; -webkit-mask-position: -150% 0; }
            100% { mask-position: 250% 0;  -webkit-mask-position: 250% 0; }
        }

        .logo {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 60px;
            height: 60px;
            background-image: url('forbes-logo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            filter: brightness(0);
            z-index: 10;
        }

        .freespin-image {
            position: absolute;
            left: 50%;
            top: 60px;
            width: 130px;
            height: auto;
            transform: translateX(-50%) scale(0.08);
            opacity: 0;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
            z-index: 3;
        }

        .freespin-title {
            position: absolute;
            left: 50%;
            top: 150px;
            width: 270px;
            transform: translateX(-50%);
            perspective: 400px;
            text-align: center;
            color: #fff;
            font-size: 34px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.3px;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            z-index: 3;
        }

        .freespin-letter,
        .deposit-letter,
        .wheel-letter {
            display: inline-block;
        }

        .deposit-image {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
        }

        .deposit-group {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: translate(-50%, -50%) scale(0.08);
            transform-origin: 50% 50%;
            opacity: 0;
            text-align: center;
            z-index: 3;
        }

        .deposit-title {
            color: #1f1f1f;
            font-size: 21px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            perspective: 400px;
        }

        .deposit-subtitle {
            max-width: 230px;
            color: #fff;
            font-size: 32px;
            line-height: 1.15;
            font-weight: 900;
            letter-spacing: -0.2px;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            perspective: 400px;
        }

        .wheel-image {
            position: absolute;
            left: 50%;
            top: 50px;
            width: 130px;
            height: auto;
            transform: translateX(-50%) scale(0.08);
            opacity: 0;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
            z-index: 3;
        }

        .wheel-title {
            position: absolute;
            left: 50%;
            top: 135px;
            width: 270px;
            transform: translateX(-50%);
            perspective: 400px;
            text-align: center;
            color: #fff;
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.3px;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            z-index: 3;
        }

        .cta-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 280px;
            transform: translate(-50%, -50%) scale(0.08);
            transform-origin: 50% 50%;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 12;
        }

        .cta-button {
            width: 250px;
            min-height: 64px;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 20px;
            line-height: 1;
            font-weight: 900;
            padding: 16px 14px;
            transition: filter 0.2s ease;
            color: #ffffff;
            background: linear-gradient(180deg, #0b9f6a 0%, #057a50 100%);
            border: 2px solid #1fd092;
            box-shadow: 0 8px 18px rgba(5, 122, 80, 0.45);
        }

        .cta-button:hover {
            filter: brightness(1.08);
        }

        .warning {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 270px;
            height: 20px;
            color: #676464;
            font-size: 7px;
            line-height: 9px;
            padding: 0 10px;
            text-align: center;
        }

        .debug-panel {
            width: 300px;
            min-width: 300px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(20, 20, 20, 0.82);
            border-radius: 8px;
            color: #fff;
            font-size: 10px;
            line-height: 1;
        }

        .debug-buttons {
            display: flex;
            gap: 4px;
        }

        .debug-button {
            flex: 1;
            min-width: 0;
            padding: 4px 0;
            border: 0;
            border-radius: 4px;
            background: #f5b30c;
            color: #111;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .debug-scrubber {
            width: 100%;
            margin: 0;
        }

        .debug-time {
            display: flex;
            justify-content: space-between;
            opacity: 0.9;
        }

        /* ==================== COIN ANIMATION ==================== */
        .coin-generator {
            width: 64px;
            height: 64px;
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
        }

        .coin {
            position: absolute;
            bottom: 0;
            left: 50%;
            z-index: 100;
            opacity: 0;
        }

        .coin::after {
            content: "$";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            font-size: 14px;
            font-weight: bold;
            color: rgb(237, 196, 107);
            background: rgb(227, 162, 23);
            border: 2px solid rgb(237, 196, 107);
            border-radius: 50%;
        }

        .coin--animated,
        .coin--animated::after {
            animation-delay: var(--coin-delay, 0s);
            animation-duration: var(--coin-duration, 1.5s);
            animation-fill-mode: both;
            animation-iteration-count: 1;
        }

        .coin--animated {
            animation-name: coin-x-axis;
            animation-timing-function: ease-in;
        }

        .coin--animated::after {
            animation-name: coin-y-axis-and-flip;
            animation-timing-function: ease-out;
        }

        @keyframes coin-x-axis {
            0% {
                opacity: 0;
                transform: translateX(0);
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateX(var(--coin-to-x));
            }
        }

        @keyframes coin-y-axis-and-flip {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(var(--coin-to-y)) rotate3d(1, 1, 1, 720deg);
            }
        }
    </style>
</head>

<body>
    <div class="banner">
        <div class="yellow-wedge"></div>
        <div class="crown-pattern-wrap">
            <div class="crown-pattern"></div>
            <div class="crown-shimmer"></div>
        </div>
        <div class="logo"></div>
        <div class="coin-generator">
            <div class="coin coin--animated" style="--coin-to-x: -80px; --coin-to-y: -130px; --coin-delay: 0s;"></div>
            <div class="coin coin--animated" style="--coin-to-x: -10px; --coin-to-y: -190px; --coin-delay: 0.21s;">
            </div>
            <div class="coin coin--animated" style="--coin-to-x: 50px; --coin-to-y: -160px; --coin-delay: 0.43s;"></div>
            <div class="coin coin--animated" style="--coin-to-x: 90px; --coin-to-y: -140px; --coin-delay: 0.64s;"></div>
            <div class="coin coin--animated" style="--coin-to-x: -40px; --coin-to-y: -170px; --coin-delay: 0.86s;">
            </div>
            <div class="coin coin--animated" style="--coin-to-x: 20px; --coin-to-y: -180px; --coin-delay: 1.07s;"></div>
            <div class="coin coin--animated" style="--coin-to-x: 0px; --coin-to-y: -210px; --coin-delay: 1.29s;"></div>
        </div>
        <img class="freespin-image" src="50freespinu.webp" alt="50 freespinů">
        <div class="freespin-title"><span class="freespin-letter">F</span><span class="freespin-letter">R</span><span
                class="freespin-letter">E</span><span class="freespin-letter">E</span><span
                class="freespin-letter">S</span><span class="freespin-letter">P</span><span
                class="freespin-letter">I</span><span class="freespin-letter">N</span><span
                class="freespin-letter">Ů</span></div>
        <div class="deposit-group">
            <img class="deposit-image" src="vklad.webp" alt="Vkladový bonus">
            <div class="deposit-title"><span class="deposit-letter">V</span><span class="deposit-letter">k</span><span
                    class="deposit-letter">l</span><span class="deposit-letter">a</span><span
                    class="deposit-letter">d</span><span class="deposit-letter">o</span><span
                    class="deposit-letter">v</span><span class="deposit-letter">ý</span> <span
                    class="deposit-letter">b</span><span class="deposit-letter">o</span><span
                    class="deposit-letter">n</span><span class="deposit-letter">u</span><span
                    class="deposit-letter">s</span></div>
            <div class="deposit-subtitle"><span class="deposit-letter">a</span><span class="deposit-letter">ž</span>
                <span class="deposit-letter">1</span><span class="deposit-letter">2</span><span
                    class="deposit-letter">5</span> <span class="deposit-letter">0</span><span
                    class="deposit-letter">0</span><span class="deposit-letter">0</span> <span
                    class="deposit-letter">K</span><span class="deposit-letter">č</span></div>
        </div>
        <img class="wheel-image" src="kolo.webp" alt="Uvítací kolo štěstí">
        <div class="wheel-title"><span style="white-space:nowrap"><span class="wheel-letter">U</span><span
                    class="wheel-letter">v</span><span class="wheel-letter">í</span><span
                    class="wheel-letter">t</span><span class="wheel-letter">a</span><span
                    class="wheel-letter">c</span><span class="wheel-letter">í</span> <span
                    class="wheel-letter">k</span><span class="wheel-letter">o</span><span
                    class="wheel-letter">l</span><span class="wheel-letter">o</span></span><br><span
                style="white-space:nowrap"><span class="wheel-letter">š</span><span class="wheel-letter">t</span><span
                    class="wheel-letter">ě</span><span class="wheel-letter">s</span><span
                    class="wheel-letter">t</span><span class="wheel-letter">í</span></span></div>
        <div class="cta-wrap">
            <button class="cta-button" type="button">REGISTROVAT SE</button>
        </div>

        <div class="warning">Ministerstvo financí varuje: účastí na hazardní hře může vzniknout závislost!
            Hrát mohou pouze osoby starší 18 let. Podmínky akce na www.forbescasino.cz</div>
    </div>

    <div class="debug-panel">
        <div>GSAP debug</div>
        <input class="debug-scrubber" type="range" min="0" max="1000" value="0">
        <div class="debug-time">
            <span class="debug-current">0.00s</span>
            <span class="debug-total">0.00s</span>
        </div>
        <div class="debug-buttons">
            <button class="debug-button debug-toggle" type="button">Start</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        gsap.set('.deposit-image', { scale: 1 });
        gsap.set('.freespin-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
        gsap.set('.deposit-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
        gsap.set('.wheel-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
        /* Logo zacina velke a vystrednene, pak odfrakne do rohu */
        gsap.set('.logo', { width: 200, height: 100, left: '50%', top: '50%', xPercent: -50, yPercent: -50 });

        const scrubber = document.querySelector('.debug-scrubber');
        const currentTimeLabel = document.querySelector('.debug-current');
        const totalTimeLabel = document.querySelector('.debug-total');
        const toggleButton = document.querySelector('.debug-toggle');
        const tl = gsap.timeline({ delay: 0.6 });

        window.tl = tl;

        /* ==================== INTRO ==================== */
        /* Velke logo + mince jsou viditelne 2s, pote logo odleti do rohu. */
        tl.to('.logo', {
            /* Logo odleti z centra do leveho horniho rohu */
            duration: 0.55,
            width: 60,
            height: 40,
            left: 15,
            top: 15,
            xPercent: 0,
            yPercent: 0,
            ease: 'power2.inOut'
        }, '+=1').to('.freespin-image', {

            /* ================== SCENA 1 ================== */
            /* Zobrazit freespiny a jejich title. */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }, '-=0.01').set('.freespin-title', { opacity: 1 }, 1.5).to('.freespin-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, 1.5).to('.freespin-image', {

            /* --------------- SCENA 1 GLOW --------------- */
            /* Zoom a zesileni svitu kolem obrazku freespinu. */
            duration: 0.5,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }).to('.freespin-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.freespin-image', {
            duration: 0.4,
            scale: 1,
            filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))',
            ease: 'elastic.out(1, 0.4)'
        }).to(['.freespin-image', '.freespin-title'], {

            /* ------------- PRECHOD 1 -> 2 -------------- */
            /* Odchod freespinu stylem "vcucnuti" do stredu. */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').to('.deposit-group', {

            /* ================== SCENA 2 ================== */
            /* Prichod vkladoveho bonusu. */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }).to('.deposit-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, 4.8).to('.deposit-image', {

            /* --------------- SCENA 2 GLOW --------------- */
            /* Stejny glow efekt pro obrazek vkladu. */
            duration: 0.5,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }, '<').to('.deposit-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.deposit-image', {
            duration: 0.6,
            scale: 1,

            ease: 'elastic.out(1, 0.4)'
        }).to(['.deposit-group'], {

            /* ------------- PRECHOD 2 -> 3 -------------- */
            /* Schovat cely blok vkladoveho bonusu stylem "vcucnuti". */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').to('.wheel-image', {

            /* ================== SCENA 3 ================== */
            /* Prichod kola stesti a jeho title. */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }).set('.wheel-title', { opacity: 1 }, '-=0.55').to('.wheel-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, '-=0.55').to('.wheel-image', {

            /* --------------- SCENA 3 GLOW --------------- */
            /* Finalni glow a zvyrazneni kola stesti. */
            duration: 0.4,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }, '-=0.5').to('.wheel-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.8)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.wheel-image', {
            duration: 0.6,
            scale: 1,
            filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))',
            ease: 'elastic.out(1, 0.4)'
        }).to(['.wheel-image', '.wheel-title'], {

            /* ------------- PRECHOD 3 -> CTA ------------- */
            /* Odejit final frame a otevrit velke CTA tlacitko. */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').to('.cta-wrap', {

            /* ================== SCENA 4 ================== */
            /* Velke CTA tlacitko alespon na 3 sekundy. */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'back.out(1.2)'
        }).to({}, {
            duration: 3
        });

        const updateDebugUI = () => {
            const currentTime = tl.time();
            const duration = tl.duration();
            const progress = duration === 0 ? 0 : (currentTime / duration) * 1000;

            scrubber.value = String(progress);
            currentTimeLabel.textContent = `${currentTime.toFixed(2)}s`;
            totalTimeLabel.textContent = `${duration.toFixed(2)}s`;
        };

        tl.eventCallback('onUpdate', updateDebugUI);
        tl.eventCallback('onComplete', updateDebugUI);
        updateDebugUI();

        scrubber.addEventListener('input', () => {
            tl.pause();
            tl.progress(Number(scrubber.value) / 1000);
            updateDebugUI();
        });

        toggleButton.addEventListener('click', () => {
            if (tl.paused()) {
                tl.play();
                toggleButton.textContent = 'Stop';
            } else {
                tl.pause();
                toggleButton.textContent = 'Start';
            }
        });
    </script>
</body>

</html>
