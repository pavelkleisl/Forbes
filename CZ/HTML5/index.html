<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ad.size" content="width=300,height=250">
    <title>Forbes Casino Banner</title>
    <script>
        window.clickTag = window.clickTag || 'https://www.forbescasino.cz/';
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: auto;
        }

        body {
            width: 300px;
            min-height: 250px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        }

        .banner {
            width: 300px;
            height: 250px;
            flex: 0 0 auto;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #f8f8f8 0%, #f0f0f0 50%, #e8e8e8 100%);
            cursor: pointer;
        }

        .click-layer {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: block;
            text-decoration: none;
            background: transparent;
        }



        .yellow-wedge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FEEB15 0%, #F5B30C 100%);
            clip-path: polygon(0 60%, 100% 35%, 100% 100%, 0 100%);
            z-index: 1;
        }

        .crown-pattern-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .crown-pattern {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;

            /* Použijeme stejné SVG dvakrát */
            background-image: url('korunka.svg'), url('korunka.svg');
            background-repeat: repeat;

            /* Nastavíme pevnou velikost dlaždice (např. 60px) */
            background-size: 60px 60px;

            /* První vrstva je na 0 0, druhá je posunutá o polovinu velikosti (20px) */
            background-position: 0 0, 30px 30px;

            opacity: 0.04;
            /* Rotace zajistí ten šikmý efekt z obrázku */
            transform: rotate(15deg);
        }

        .crown-shimmer {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-image: url('korunka.svg'), url('korunka.svg');
            background-repeat: repeat;
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            filter: sepia(1) saturate(5) hue-rotate(-9deg) brightness(1.55) contrast(1.06);
            opacity: 0.2;
            transform: rotate(15deg);
            pointer-events: none;
            mask-image: linear-gradient(108deg, transparent 30%, rgba(255, 255, 255, 0.78) 50%, transparent 70%);
            -webkit-mask-image: linear-gradient(108deg, transparent 30%, rgba(255, 255, 255, 0.78) 50%, transparent 70%);
            mask-size: 265% 100%;
            -webkit-mask-size: 265% 100%;
            mask-position: -170% 0;
            -webkit-mask-position: -170% 0;
            animation: crown-shimmer-wave 6s ease-in-out infinite;
            animation-duration: 7s;
            animation-delay: 0s;
            animation-play-state: paused;
        }

        .banner.shimmer-active .crown-shimmer {
            animation-play-state: running;
        }

        @keyframes crown-shimmer-wave {
            0%   { mask-position: -150% 0; -webkit-mask-position: -150% 0; }
            100% { mask-position: 250% 0;  -webkit-mask-position: 250% 0; }
        }

        .logo {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 60px;
            height: 60px;
            background-image: url('forbes-logo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            filter: brightness(0);
            z-index: 10;
            transform-origin: center center;
        }

        .freespin-image {
            position: absolute;
            left: 50%;
            top: 60px;
            width: 130px;
            height: auto;
            transform: translateX(-50%) scale(0.08);
            opacity: 0;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
            z-index: 3;
        }

        .freespin-title {
            position: absolute;
            left: 50%;
            top: 150px;
            width: 270px;
            transform: translateX(-50%);
            perspective: 400px;
            text-align: center;
            color: #fff;
            font-size: 34px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.3px;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            z-index: 3;
        }

        .freespin-letter,
        .deposit-letter,
        .wheel-letter {
            display: inline-block;
        }

        .deposit-image {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
        }

        .deposit-group {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: translate(-50%, -50%) scale(0.08);
            transform-origin: 50% 50%;
            opacity: 0;
            text-align: center;
            z-index: 3;
        }

        .deposit-title {
            color: #1f1f1f;
            font-size: 21px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            perspective: 400px;
        }

        .deposit-subtitle {
            max-width: 230px;
            color: #fff;
            font-size: 32px;
            line-height: 1.15;
            font-weight: 900;
            letter-spacing: -0.2px;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            perspective: 400px;
        }

        .wheel-image {
            position: absolute;
            left: 50%;
            top: 50px;
            width: 130px;
            height: auto;
            transform: translateX(-50%) scale(0.08);
            opacity: 0;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
            z-index: 3;
        }

        .wheel-title {
            position: absolute;
            left: 50%;
            top: 135px;
            width: 270px;
            transform: translateX(-50%);
            perspective: 400px;
            text-align: center;
            color: #fff;
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.3px;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            z-index: 3;
        }

        .cta-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 280px;
            transform: translate(-50%, -50%) scale(0.08);
            transform-origin: 50% 50%;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 12;
        }

        .cta-button {
            width: 250px;
            min-height: 64px;
            border-radius: 999px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 20px;
            line-height: 1;
            font-weight: 900;
            padding: 16px 14px;
            transition: filter 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            color: #ffffff;
            background: linear-gradient(180deg, #2d49c0 0%, #17349f 45%, #102575 100%);
            border: 2px solid #6b8dff;
            box-shadow: 0 12px 26px rgba(17, 42, 136, 0.55);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: -140%;
            left: -45%;
            width: 38%;
            height: 380%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.08) 30%,
                    rgba(255, 255, 255, 0.55) 50%,
                    rgba(255, 255, 255, 0.08) 70%,
                    rgba(255, 255, 255, 0) 100%);
            transform: rotate(20deg) translateX(-320px);
            animation: cta-sheen-pass 7s ease-in-out infinite;
            animation-play-state: paused;
            pointer-events: none;
        }

        .cta-button.sheen-run::before {
            animation-play-state: running;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.24) 0%, rgba(255, 255, 255, 0) 48%, rgba(255, 255, 255, 0.12) 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        @keyframes cta-sheen-pass {
            0%,
            76% {
                transform: rotate(20deg) translateX(-320px);
            }

            92% {
                transform: rotate(20deg) translateX(360px);
            }

            100% {
                transform: rotate(20deg) translateX(360px);
            }
        }

        .cta-button:hover {
            filter: brightness(1.12) saturate(1.08);
            transform: translateY(-2px) scale(1.01);
            border-color: #9eb6ff;
            box-shadow: 0 18px 34px rgba(11, 32, 116, 0.62), 0 0 0 3px rgba(116, 156, 255, 0.2);
        }

        .banner:hover .cta-button {
            filter: brightness(1.12) saturate(1.08);
            transform: translateY(-2px) scale(1.01);
            border-color: #9eb6ff;
            box-shadow: 0 18px 34px rgba(11, 32, 116, 0.62), 0 0 0 3px rgba(116, 156, 255, 0.2);
        }

        .cta-button:hover::after {
            opacity: 1;
        }

        .cta-button:active {
            transform: translateY(0) scale(0.99);
        }

        .warning {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 270px;
            height: 20px;
            color: #676464;
            font-size: 7px;
            line-height: 9px;
            padding: 0 10px;
            text-align: center;
            z-index: 3;
        }

        .debug-panel {
            width: 300px;
            min-width: 300px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(20, 20, 20, 0.82);
            border-radius: 8px;
            color: #fff;
            font-size: 10px;
            line-height: 1;
        }

        .debug-buttons {
            display: flex;
            gap: 4px;
        }

        .debug-button {
            flex: 1;
            min-width: 0;
            padding: 4px 0;
            border: 0;
            border-radius: 4px;
            background: #f5b30c;
            color: #111;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .debug-scrubber {
            width: 100%;
            margin: 0;
        }

        .debug-time {
            display: flex;
            justify-content: space-between;
            opacity: 0.9;
        }

        /* ==================== COIN ANIMATION ==================== */
        .coin-generator {
            width: 64px;
            height: 64px;
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
        }

        .coin {
            position: absolute;
            bottom: 0;
            left: 50%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .coin::after {
            content: "$";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            font-size: 14px;
            font-weight: bold;
            color: rgb(237, 196, 107);
            background: rgb(227, 162, 23);
            border: 2px solid rgb(237, 196, 107);
            border-radius: 50%;
        }

        .coin--animated,
        .coin--animated::after {
            animation-delay: var(--coin-delay, 0s);
            animation-duration: var(--coin-duration, 1.5s);
            animation-fill-mode: both;
            animation-iteration-count: 1;
        }

        .coin--animated {
            animation-name: coin-x-axis;
            animation-timing-function: ease-in;
        }

        .coin--animated::after {
            animation-name: coin-y-axis-and-flip;
            animation-timing-function: ease-out;
        }

        @keyframes coin-x-axis {
            0% {
                opacity: 0;
                transform: translateX(0);
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateX(var(--coin-to-x));
            }
        }

        @keyframes coin-y-axis-and-flip {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(var(--coin-to-y)) rotate3d(1, 1, 1, 720deg);
            }
        }
    </style>
</head>

<body>
    <div class="banner shimmer-active">

    <div class="debug-panel">
        <div>GSAP debug</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const banner = document.querySelector('.banner');
        const clickLayer = document.querySelector('.click-layer');

        const openClickTag = (event) => {
            event.preventDefault();
            const targetUrl = (typeof window.clickTag === 'string' && window.clickTag.trim()) ? window.clickTag : 'https://www.forbescasino.cz/';
            window.open(targetUrl, '_blank');
        };

        clickLayer.addEventListener('click', openClickTag);

        const resetLoopState = () => {
            banner.classList.add('shimmer-active');
            gsap.set('.deposit-image', { scale: 1, filter: 'drop-shadow(0 0 0px rgba(255, 215, 0, 0.99))' });
            gsap.set('.freespin-image', { scale: 0.08, opacity: 0, filter: 'drop-shadow(0 0 0px rgba(255, 215, 0, 0.99))' });
            gsap.set('.freespin-title', { opacity: 0, scale: 1 });
            gsap.set('.deposit-group', { scale: 0.08, opacity: 0 });
            gsap.set('.wheel-image', { scale: 0.08, opacity: 0, filter: 'drop-shadow(0 0 0px rgba(255, 215, 0, 0.99))' });
            gsap.set('.wheel-title', { opacity: 0, scale: 1 });
            gsap.set('.cta-wrap', { scale: 0.08, opacity: 0 });
            gsap.set('.freespin-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
            gsap.set('.deposit-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
            gsap.set('.wheel-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
            
            /* Logo reset s vynulováním rotace a měřítka */
            gsap.set('.logo', { 
                width: 200, 
                height: 100, 
                left: '50%', 
                top: '50%', 
                xPercent: -50, 
                yPercent: -50, 
                rotation: 0,
                scale: 1,
                filter: 'brightness(0)' 
            });
            gsap.set('.coin-generator', { autoAlpha: 1 });
        };

        resetLoopState();

        const scrubber = document.querySelector('.debug-scrubber');
        const currentTimeLabel = document.querySelector('.debug-current');
        const totalTimeLabel = document.querySelector('.debug-total');
        const toggleButton = document.querySelector('.debug-toggle');
        const tl = gsap.timeline({ delay: 0.6, repeat: -1, repeatDelay: 0 });

        window.tl = tl;

        /* ==================== INTRO ==================== */
        /* Dynamický odlet loga s mírným náklonem a pružným dojezdem */
        tl.to('.logo', {
            duration: 0.7,
            width: 60,
            height: 40,
            left: 15,
            top: 15,
            xPercent: 0,
            yPercent: 0,
            rotation: -5,
            ease: "back.inOut(1.7)"
        }, '+=1.5')
        .to('.logo', {
            duration: 0.3,
            rotation: 0,
            ease: "power2.out"
        }, '-=0.2')
        .call(() => {
            banner.classList.remove('shimmer-active');
        }).addLabel('scena1').set('.coin-generator', { autoAlpha: 0 }, 'scena1').to('.freespin-image', {

            /* ================== SCENA 1 ================== */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }, 'scena1-=0.01').set('.freespin-title', { opacity: 1 }, 'scena1').to('.freespin-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, 'scena1').to('.freespin-image', {

            /* --------------- SCENA 1 GLOW --------------- */
            duration: 0.5,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }).to('.freespin-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.freespin-image', {
            duration: 0.4,
            scale: 1,
            filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))',
            ease: 'elastic.out(1, 0.4)'
        }).to(['.freespin-image', '.freespin-title'], {

            /* ------------- PRECHOD 1 -> 2 -------------- */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').addLabel('scena2').to('.deposit-group', {

            /* ================== SCENA 2 ================== */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }).to('.deposit-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, 'scena2').to('.deposit-image', {

            /* --------------- SCENA 2 GLOW --------------- */
            duration: 0.5,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }, '<').to('.deposit-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.deposit-image', {
            duration: 0.6,
            scale: 1,

            ease: 'elastic.out(1, 0.4)'
        }).to(['.deposit-group'], {

            /* ------------- PRECHOD 2 -> 3 -------------- */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').addLabel('scena3').to('.wheel-image', {

            /* ================== SCENA 3 ================== */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'power2.out'
        }).set('.wheel-title', { opacity: 1 }, '-=0.55').to('.wheel-letter', {
            y: 0,
            opacity: 1,
            rotateX: 0,
            filter: 'blur(0px)',
            duration: 0.55,
            ease: 'power3.out',
            stagger: { each: 0.045, from: 'start' }
        }, '-=0.55').to('.wheel-image', {

            /* --------------- SCENA 3 GLOW --------------- */
            duration: 0.4,
            scale: 1.25,
            filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))',
            ease: 'back.out(1.5)'
        }, '-=0.5').to('.wheel-image', {
            duration: 0.4,
            filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.8)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))',
            ease: 'power1.out'
        }).to('.wheel-image', {
            duration: 0.6,
            scale: 1,
            filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))',
            ease: 'elastic.out(1, 0.4)'
        }).to(['.wheel-image', '.wheel-title'], {

            /* ------------- PRECHOD 3 -> CTA ------------- */
            duration: 0.5,
            scale: 0.08,
            opacity: 0,
            transformOrigin: '50% 50%',
            ease: 'power3.in'
        }, '+=.5').call(() => {
            banner.classList.add('shimmer-active');
        }).addLabel('scena4').call(() => {
            const btn = document.querySelector('.cta-button');
            btn.classList.remove('sheen-run');
            void btn.offsetWidth;
            btn.classList.add('sheen-run');
        }).to('.cta-wrap', {

            /* ================== SCENA 4 ================== */
            duration: 0.55,
            scale: 1,
            opacity: 1,
            transformOrigin: '50% 50%',
            ease: 'back.out(1.2)'
        }).to({}, {
            duration: 3
        })
        /* --- EXPLOZIVNÍ NÁVRAT LOGA --- */
        .to('.cta-wrap', {
            duration: 0.4,
            scale: 1.4,
            opacity: 0,
            ease: 'power2.in'
        })
        .to('.logo', {
            duration: 0.8,
            width: 200,
            height: 100,
            left: '50%',
            top: '50%',
            xPercent: -50,
            yPercent: -50,
            rotation: 360,
            filter: 'brightness(0)',
            ease: "back.out(1.5)"
        }, '-=0.2')
        .to('.logo', {
            duration: 0.2,
            scale: 1.1,
            ease: "power1.inOut"
        })
        .to('.logo', {
            duration: 0.2,
            scale: 1,
            ease: "power1.inOut"
        })
        .call(() => {
            gsap.delayedCall(1, () => {
                resetLoopState();
            });
        });

        const updateDebugUI = () => {
            const currentTime = tl.time();
            const duration = tl.duration();
            const progress = duration === 0 ? 0 : (currentTime / duration) * 1000;

            scrubber.value = String(progress);
            currentTimeLabel.textContent = `${currentTime.toFixed(2)}s`;
            totalTimeLabel.textContent = `${duration.toFixed(2)}s`;
        };

        tl.eventCallback('onUpdate', updateDebugUI);
        tl.eventCallback('onComplete', updateDebugUI);
        tl.eventCallback('onRepeat', updateDebugUI);
        updateDebugUI();

        scrubber.addEventListener('input', () => {
            tl.pause();
            tl.progress(Number(scrubber.value) / 1000);
            updateDebugUI();
        });

        toggleButton.addEventListener('click', () => {
            if (tl.paused()) {
                tl.play();
                toggleButton.textContent = 'Stop';
            } else {
                tl.pause();
                toggleButton.textContent = 'Start';
            }
        });
    </script>
</body>

</html>
