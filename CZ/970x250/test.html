<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes Casino Banner 970x250 - Exact Layout + Debug Panel</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. ZÁKLADNÍ CSS PROMĚNNÉ (Témata podle Forbes)
           ========================================= */
        :root {
            /* Theme 1 - Forbes Main (Tmavě modrá + Žlutá) */
            --bg-left: #0b1126; 
            --bg-right-dark: #050814;
            --bg-right-light: #1b43aa; 
            --accent-text: #facc15; 
            --bonus-color: #ffffff;
            --slash-color: #facc15;
        }

        /* Dynamická barevná schémata z Debug Panelu */
        /* Forbes Main (Modro-žlutá) */
        #banner.theme-1 { --bg-left: #0b1126; --bg-right-dark: #050814; --bg-right-light: #1b43aa; --accent-text: #facc15; --bonus-color: #ffffff; --slash-color: #facc15; }
        /* Space Blue (Hluboký vesmír) */
        #banner.theme-2 { --bg-left: #0f172a; --bg-right-dark: #000000; --bg-right-light: #0f172a; --accent-text: #38bdf8; --bonus-color: #facc15; --slash-color: #38bdf8; } 
        /* Dark Gold (Prémiová černozlatá) */
        #banner.theme-3 { --bg-left: #171717; --bg-right-dark: #0a0a0a; --bg-right-light: #262626; --accent-text: #facc15; --bonus-color: #facc15; --slash-color: #facc15; } 
        /* Jackpot Purple (Podle vašeho Tsunami jackpotu) */
        #banner.theme-4 { --bg-left: #1e1b4b; --bg-right-dark: #120b29; --bg-right-light: #3b2875; --accent-text: #facc15; --bonus-color: #ffffff; --slash-color: #d946ef; } 
        /* Mystery Green (Podle vašeho Mystery jackpotu) */
        #banner.theme-5 { --bg-left: #020617; --bg-right-dark: #020617; --bg-right-light: #0f172a; --accent-text: #10b981; --bonus-color: #ffffff; --slash-color: #10b981; } 

        body, html { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Rubik', sans-serif; }

        /* =========================================
           2. STYLY BANNERU
           ========================================= */
        #banner {
            width: 970px;
            height: 250px;
            position: relative;
            overflow: hidden;
            background-color: #050814; 
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #1e293b;
            flex-shrink: 0;
            transition: all 0.5s ease;
        }

        /* --- LEVÁ ČÁST --- */
        .left-side {
            position: absolute;
            width: 53%; 
            height: 100%;
            background-color: var(--bg-left);
            z-index: 1;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
            transition: background-color 0.5s ease;
        }

        /* Hvězdné pozadí podle Forbes webu místo mřížky */
        .stars-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }

        .left-content { 
            position: absolute; 
            top: 55px; 
            left: 30px; 
            z-index: 10; 
            font-family: 'Montserrat', sans-serif;
        }
        
        .headline-white { font-size: 40px; font-weight: 900; margin: 0; line-height: 1.1; letter-spacing: -1px; }
        .headline-accent { font-size: 44px; font-weight: 900; color: var(--accent-text); margin: 0; line-height: 1.1; letter-spacing: -1px; display: flex; align-items: center; gap: 5px; transition: color 0.5s ease;}
        
        .emoji-think { font-size: 38px; position: relative; left: -5px; }
        .emoji-yawn { font-size: 24px; position: absolute; bottom: -30px; left: 0; }

        /* --- PRAVÁ ČÁST --- */
        .right-side {
            position: absolute;
            width: 60%;
            height: 100%;
            right: 0;
            background: linear-gradient(135deg, var(--bg-right-light) 0%, var(--bg-right-dark) 100%);
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-left: 50px;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        .neon-slash {
            position: absolute;
            width: 4px;
            height: 150%;
            background: var(--slash-color);
            top: -20%;
            left: 41%;
            transform: rotate(15deg);
            box-shadow: 0 0 20px 5px var(--slash-color);
            z-index: 3;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .right-content { 
            text-align: center; 
            z-index: 10; 
            position: relative; 
            left: -15px; 
            margin-right: 180px; 
        }
        
        .bonus-color { font-size: 38px; font-weight: 800; color: var(--bonus-color); margin: 0; line-height: 1; text-shadow: 0 0 15px rgba(255, 255, 255, 0.1); white-space: nowrap; transition: color 0.5s ease;}
        .bonus-white { font-size: 48px; font-weight: 900; margin: 5px 0; line-height: 1; white-space: nowrap; }
        .bonus-sub { font-size: 16px; font-weight: 500; letter-spacing: 2px; color: #cbd5e1; white-space: nowrap; }

        .cta-btn {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            padding: 15px 35px;
            font-family: 'Rubik', sans-serif;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 25px; /* Zakulacená tlačítka podle Forbes webu */
            z-index: 10;
            cursor: pointer;
            transition: box-shadow 0.3s, transform 0.2s ease, filter 0.2s;
        }

        /* Dynamické třídy pro CTA z Debug Panelu (Podle webu) */
        .cta-variant-1 { background: #facc15; color: #000; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3); } /* Forbes Žlutá */
        .cta-variant-2 { background: #ffffff; color: #0b1126; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); } /* Bílá */

        .floating-item { position: absolute; z-index: 4; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .f-7 { font-size: 60px; left: 45%; top: 30%; transform: rotate(-15deg); }
        .f-wheel { font-size: 100px; left: 35%; bottom: -20px; }
        .f-chip1 { font-size: 70px; right: 200px; bottom: 10px; transform: rotate(20deg); }
        .f-coin1 { font-size: 30px; left: 52%; top: 10px; }
        .f-dia1 { font-size: 25px; right: 300px; top: 20px; }
        .f-dia2 { font-size: 20px; right: 250px; bottom: 30px; }

        .flare { position: absolute; width: 150px; height: 150px; border-radius: 50%; z-index: 0; transition: background 0.5s ease; }
        .flare-1 { background: radial-gradient(circle, rgba(250, 204, 21, 0.1) 0%, transparent 70%); top: -50px; left: 100px; }
        .flare-2 { background: radial-gradient(circle, rgba(27, 67, 170, 0.2) 0%, transparent 70%); bottom: -50px; left: 300px; }

        /* =========================================
           3. STYLY DEBUG PANELU
           ========================================= */
        .debug-panel {
            width: min(970px, calc(100vw - 20px));
            min-width: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 255, 0.95) 100%);
            border: 1px solid rgba(22, 56, 168, 0.2);
            border-radius: 14px;
            box-shadow: 0 14px 34px rgba(18, 34, 81, 0.24);
            color: #1d2340;
            font-size: 12px;
            line-height: 1.25;
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .debug-row-group { display: flex; gap: 20px; }
        .debug-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }

        .debug-heading { font-size: 15px; font-weight: 900; letter-spacing: 0.2px; margin-bottom: 2px;}
        .debug-buttons { display: flex; gap: 4px; }
        .debug-button { flex: 1; min-width: 0; min-height: 40px; padding: 8px 12px; border: 0; border-radius: 10px; background: linear-gradient(180deg, #2147c2 0%, #1237ab 100%); color: #fff; font-size: 12px; font-weight: 800; letter-spacing: 0.2px; cursor: pointer; transition: filter 0.2s ease, transform 0.2s ease; }
        .debug-button:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .debug-scrubber { width: 100%; margin: 0; accent-color: #1740b4; min-height: 30px; }
        .debug-time { display: flex; justify-content: space-between; opacity: 0.95; color: #394064; font-weight: 700; margin-top: -5px;}
        
        .debug-variants-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 4px; }
        .debug-variant { min-width: 0; min-height: 34px; padding: 5px; border: 1px solid rgba(36, 53, 120, 0.22); border-radius: 8px; background: rgba(255, 255, 255, 0.92); color: #283055; font-size: 11px; font-weight: 700; cursor: pointer; transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease; }
        .debug-variant:hover { border-color: rgba(23, 64, 180, 0.5); background: #f3f7ff; transform: translateY(-1px); }
        .debug-variant.active { background: linear-gradient(180deg, #fee93c 0%, #f7c61b 100%); color: #1f1f1f; border-color: #e9b413; }
        .debug-title { font-size: 11px; font-weight: 800; letter-spacing: 0.3px; color: #1d2340; }
    </style>
</head>
<body>

    <div id="banner" class="theme-1">
        <div class="left-side">
            <div class="stars-bg"></div>
            <div class="flare flare-1"></div>
            <div class="flare flare-2"></div>
            
            <div class="left-content">
                <div class="headline-white">NUDNÝ VEČER?</div>
                <div class="headline-accent">HLEDEJ AKCI. <span class="emoji-think">🤔</span></div>
                <div class="emoji-yawn">🥱 <span style="font-size: 12px; color: #666;">. . .</span></div>
            </div>
        </div>

        <div class="neon-slash"></div>

        <div class="right-side">
            <div class="right-content">
                <div class="bonus-color">ZÍSKEJ 1000 KČ</div>
                <div class="bonus-white">BONUS</div>
                <div class="bonus-sub">NA PRVNÍ VKLAD!</div>
            </div>
        </div>

        <button class="cta-btn cta-variant-1">JDU NA TO</button>

        <div class="floating-item f-7">🎰</div>
        <div class="floating-item f-wheel">🎯</div>
        <div class="floating-item f-chip1">🪙</div>
        <div class="floating-item f-coin1">💰</div>
        <div class="floating-item f-dia1">💎</div>
        <div class="floating-item f-dia2">💎</div>
    </div>

    <div class="debug-panel">
        <div class="debug-heading">Řídicí panel animace (Forbes Style)</div>
        
        <div class="debug-row-group">
            <div class="debug-col" style="flex: 2;">
                <div class="debug-title">Barevné schéma banneru</div>
                <div class="debug-variants-grid" id="theme-buttons">
                    <button class="debug-variant active" data-theme="1" type="button">Main</button>
                    <button class="debug-variant" data-theme="2" type="button">Space</button>
                    <button class="debug-variant" data-theme="3" type="button">Gold</button>
                    <button class="debug-variant" data-theme="4" type="button">Jackpot</button>
                    <button class="debug-variant" data-theme="5" type="button">Mystery</button>
                </div>
            </div>

            <div class="debug-col">
                <div class="debug-title">Rychlost animace</div>
                <div class="debug-variants-grid" id="speed-buttons">
                    <button class="debug-variant" data-speed="1" type="button">1x</button>
                    <button class="debug-variant active" data-speed="1.5" type="button">1.5x</button>
                    <button class="debug-variant" data-speed="2" type="button">2x</button>
                </div>
            </div>
            
            <div class="debug-col">
                <div class="debug-title">Tlačítko</div>
                <div class="debug-variants-grid" id="cta-buttons">
                    <button class="debug-variant active" data-cta-variant="1" type="button">Žlutá</button>
                    <button class="debug-variant" data-cta-variant="2" type="button">Bílá</button>
                </div>
            </div>
        </div>
        
        <input class="debug-scrubber" type="range" min="0" max="1000" value="0">
        <div class="debug-time">
            <span>Aktuální čas: <span class="debug-current">0.00s</span></span>
            <span>Celkový čas: <span class="debug-total">0.00s</span></span>
        </div>
        <div class="debug-buttons">
            <button class="debug-button debug-toggle" type="button">Pozastavit</button>
            <button class="debug-button debug-restart" type="button">Spustit znovu</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            
            // 1. NEZÁVISLÁ ANIMACE LEVITACE
            gsap.to(".floating-item", {
                y: "random(-15, 15)",
                x: "random(-10, 10)",
                rotation: "random(-10, 10)",
                duration: "random(2, 4)",
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut",
                stagger: { each: 0.2, from: "random" }
            });

            // Hover efekty banneru 
            const banner = document.getElementById('banner');
            banner.addEventListener('mouseenter', () => {
                gsap.to(".cta-btn", { scale: 1.05, filter: "brightness(1.1)", duration: 0.3 });
                gsap.to(".neon-slash", { width: "6px", boxShadow: "0 0 30px 10px var(--slash-color)", duration: 0.3 });
            });
            banner.addEventListener('mouseleave', () => {
                gsap.to(".cta-btn", { scale: 1, filter: "brightness(1)", duration: 0.3 });
                gsap.to(".neon-slash", { width: "4px", boxShadow: "0 0 20px 5px var(--slash-color)", duration: 0.3 });
            });

            // 2. HLAVNÍ ČASOVÁ OSA
            const tl = gsap.timeline({ paused: true });
            window.tl = tl; 

            function buildTimeline() {
                tl.clear();
                
                gsap.set(".headline-white", { x: -50, opacity: 0 });
                gsap.set(".headline-accent", { x: -50, opacity: 0 });
                gsap.set(".emoji-yawn", { opacity: 0 });
                gsap.set(".right-side", { x: 100, opacity: 0 });
                gsap.set(".neon-slash", { opacity: 0, scaleY: 0 });
                gsap.set(".right-content > div", { y: 20, opacity: 0 });
                gsap.set(".cta-btn", { scale: 0.5, opacity: 0 });
                gsap.set(".floating-item", { scale: 0, opacity: 0 });

                tl.to(".headline-white", { duration: 0.6, x: 0, opacity: 1, ease: "power2.out", delay: 0.2 })
                  .to(".headline-accent", { duration: 0.6, x: 0, opacity: 1, ease: "power2.out" }, "-=0.4")
                  .to(".emoji-yawn", { duration: 0.4, opacity: 1 }, "-=0.2")
                  .to(".neon-slash", { duration: 0.5, opacity: 1, scaleY: 1, ease: "power4.inOut" }, "-=0.1")
                  .to(".right-side", { duration: 0.7, x: 0, opacity: 1, ease: "power3.out" }, "-=0.3")
                  .to(".right-content > div", { duration: 0.5, y: 0, opacity: 1, stagger: 0.15, ease: "back.out(1.5)" }, "-=0.2")
                  .to(".cta-btn", { duration: 0.6, scale: 1, opacity: 1, ease: "elastic.out(1, 0.6)" }, "-=0.3")
                  .to(".floating-item", { duration: 0.8, scale: 1, opacity: 1, stagger: 0.1, ease: "back.out(2)" }, "-=0.5");
                  
                return tl;
            }

            // 3. LOGIKA DEBUG PANELU
            const scrubber = document.querySelector('.debug-scrubber');
            const currentTimeLabel = document.querySelector('.debug-current');
            const totalTimeLabel = document.querySelector('.debug-total');
            const toggleButton = document.querySelector('.debug-toggle');
            const ctaButton = document.querySelector('.cta-btn');
            
            const variantButtons = Array.from(document.querySelectorAll('[data-cta-variant]'));
            const speedButtons = Array.from(document.querySelectorAll('[data-speed]'));
            const themeButtons = Array.from(document.querySelectorAll('[data-theme]'));

            let currentStorySpeed = 1.5;

            function updateDebugUI() {
                const speed = currentStorySpeed || 1;
                const currentTimeRaw = tl.time();
                const durationRaw = tl.duration();
                const progress = durationRaw === 0 ? 0 : (currentTimeRaw / durationRaw) * 1000;
                const currentTime = currentTimeRaw / speed;
                const duration = durationRaw / speed;

                scrubber.value = String(progress);
                currentTimeLabel.textContent = `${currentTime.toFixed(2)}s`;
                totalTimeLabel.textContent = `${duration.toFixed(2)}s`;
                toggleButton.textContent = tl.paused() ? 'Přehrát' : 'Pozastavit';
            }

            tl.eventCallback('onUpdate', updateDebugUI);
            tl.eventCallback('onComplete', () => { updateDebugUI(); toggleButton.textContent = 'Přehrát'; });

            const applyStorySpeed = (speed) => {
                currentStorySpeed = speed;
                tl.timeScale(speed);
                speedButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.speed) === speed));
                updateDebugUI();
            };

            const applyCtaVariant = (index) => {
                ctaButton.classList.remove('cta-variant-1', 'cta-variant-2');
                ctaButton.classList.add(`cta-variant-${index}`);
                variantButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.ctaVariant) === index));
            };

            const applyTheme = (index) => {
                banner.className = `theme-${index}`;
                themeButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.theme) === index));
                gsap.fromTo(banner, { opacity: 0.8 }, { opacity: 1, duration: 0.3 });
            };

            scrubber.addEventListener('input', () => {
                tl.pause();
                tl.progress(Number(scrubber.value) / 1000);
                updateDebugUI();
            });

            toggleButton.addEventListener('click', () => {
                if (tl.paused()) {
                    if (tl.progress() === 1) tl.restart(); 
                    else tl.play();
                } else {
                    tl.pause();
                }
                updateDebugUI();
            });

            document.querySelector('.debug-restart').addEventListener('click', () => {
                buildTimeline().play();
                updateDebugUI();
            });

            speedButtons.forEach(btn => btn.addEventListener('click', () => applyStorySpeed(Number(btn.dataset.speed))));
            variantButtons.forEach(btn => btn.addEventListener('click', () => applyCtaVariant(Number(btn.dataset.ctaVariant))));
            themeButtons.forEach(btn => btn.addEventListener('click', () => applyTheme(Number(btn.dataset.theme))));

            buildTimeline();
            applyStorySpeed(currentStorySpeed);
            tl.play();
        });
    </script>
</body>
</html>
