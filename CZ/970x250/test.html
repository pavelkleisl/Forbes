        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: auto;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            min-height: 100vh;
            overflow: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            justify-content: center;
            align-items: center;
        }

        .banner {
            width: 970px;
            height: 250px;
            flex: 0 0 auto;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #f8f8f8 0%, #f0f0f0 50%, #e8e8e8 100%);
            cursor: pointer;
        }

        .click-layer {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: block;
            text-decoration: none;
            background: transparent;
        }

        .yellow-wedge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FEEB15 0%, #F5B30C 100%);
            clip-path: polygon(0 60%, 100% 35%, 100% 100%, 0 100%);
            z-index: 1;
        }

        .crown-pattern-wrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .crown-pattern {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 220%;
            height: 220%;
            background-image: var(--crown-svg), var(--crown-svg);
            background-repeat: repeat;
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.04;
            transform: rotate(15deg);
        }

        .crown-shimmer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 220%;
            height: 220%;
            background-image: var(--crown-svg), var(--crown-svg);
            background-repeat: repeat;
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            filter: sepia(1) saturate(5) hue-rotate(-9deg) brightness(1.55) contrast(1.06);
            opacity: 0.2;
            transform: rotate(15deg);
            pointer-events: none;
            mask-image: linear-gradient(108deg, transparent 30%, rgba(255, 255, 255, 0.78) 50%, transparent 70%);
            -webkit-mask-image: linear-gradient(108deg, transparent 30%, rgba(255, 255, 255, 0.78) 50%, transparent 70%);
            mask-size: 265% 100%;
            -webkit-mask-size: 265% 100%;
            mask-position: -170% 0;
            -webkit-mask-position: -170% 0;
            animation: crown-shimmer-wave 6s ease-in-out infinite;
            animation-duration: 7s;
            animation-delay: 0s;
            animation-play-state: paused;
        }

        .banner.shimmer-active .crown-shimmer {
            animation-play-state: running;
        }

        @keyframes crown-shimmer-wave {
            0%   { mask-position: -150% 0; -webkit-mask-position: -150% 0; }
            100% { mask-position: 250% 0;  -webkit-mask-position: 250% 0; }
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 28px;
            width: 96px;
            height: auto;
            background-image: url('forbes-logo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            filter: brightness(0);
            z-index: 21;
            transform-origin: center center;
        }

        .freespin-image {
            position: absolute;
            left: 50%;
            top: 26px;
            width: 174px;
            height: auto;
            transform: translateX(-50%) scale(0.08);
            opacity: 0;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
            z-index: 3;
        }

        .freespin-title {
            position: absolute;

            z-index: 3;
        }

        .freespin-letter,
        .deposit-letter,

            display: inline-block;
            will-change: transform, opacity;
        }

        .deposit-image {
            width: 167px;
            height: auto;
            filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0.99));
        }

        .deposit-group {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%) scale(0.08);
            transform-origin: 50% 50%;
            opacity: 0;
            text-align: center;
            z-index: 3;
        }

        .deposit-title {
            color: #1f1f1f;
            font-size: 37px;

        }

        .deposit-subtitle {
            max-width: 500px;

            font-weight: 900;
            letter-spacing: -0.2px;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);
            perspective: 400px;
        }

        .wheel-image {
            position: absolute;
            left: 50%;

        }

        .wheel-title {
            position: absolute;

            letter-spacing: -0.3px;

            opacity: 0;
            text-shadow: -1px -1px 2px #1f1f1f, 1px -1px 2px #1f1f1f, -1px 1px 2px #1f1f1f, 1px 1px 2px #1f1f1f, 0 0 4px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 215, 0, 0.4);

        }

        .cta-wrap {
            position: absolute;
            left: 50%;
            top: 65%;

            transform: translate(-50%, -50%) scale(0.08);

            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 12;
        }

        .cta-gift {
            position: absolute;
            top: -95px;
            left: 50%;
            width: 140px;
            height: auto;
            transform: translateX(-50%) rotate(0deg);
            transform-origin: 50% 85%;
            pointer-events: none;
            will-change: transform;
            animation: cta-gift-shake 2s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes cta-gift-shake {
            0%, 82%, 100% { transform: translateX(-50%) rotate(0deg); }
            86% { transform: translateX(calc(-50% - 2px)) rotate(-4deg); }
            90% { transform: translateX(calc(-50% + 2px)) rotate(4deg); }
            94% { transform: translateX(calc(-50% - 1px)) rotate(-2deg); }
            97% { transform: translateX(-50%) rotate(0deg); }
        }

        .coin--animated::after {

        @keyframes coin-x-axis {

            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(var(--coin-to-y)) rotate3d(1, 1, 1, 720deg); }
        }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        const banner = document.querySelector('.banner');
        const clickLayer = document.querySelector('.click-layer');
        const ctaWrap = document.querySelector('.cta-wrap');
        const ctaButton = document.querySelector('.cta-button');
        const debugPanel = document.querySelector('.debug-panel');
        const debugLaunch = document.querySelector('.debug-launch');
        const variantButtons = Array.from(document.querySelectorAll('.debug-variant'));

        const applyCtaVariant = (index) => {
            const safeIndex = Math.min(Math.max(index, 1), 5);
            ctaButton.classList.remove('cta-variant-1', 'cta-variant-2', 'cta-variant-3', 'cta-variant-4', 'cta-variant-5', 'has-sheen');
            ctaButton.classList.add(`cta-variant-${safeIndex}`);
            if (safeIndex === 1 || safeIndex === 5) ctaButton.classList.add('has-sheen');
            variantButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.ctaVariant) === safeIndex));
        };

        applyCtaVariant(1);

        /* --- LOGIKA PRO MINCE (NEKONEČNÝ PROUD ZA TLAČÍTKEM) --- */
        const initFizzyEffect = () => {
            const container = document.querySelector('.particles-container');
            const numParticles = 30; // Méně částic, protože mince jsou výraznější
            const particles = [];
            let mainTimelinePaused = true;

            for (let i = 0; i < numParticles; i++) {
                const p = document.createElement('div');
                p.classList.add('coin-particle');
                p.textContent = '$';
                
                const size = gsap.utils.random(12, 20); // Velikost mincí
                gsap.set(p, {
                    width: size, height: size,
                    fontSize: size * 0.6 + 'px',
                    x: 0, y: 0,
                    left: '50%', top: '50%',
                    xPercent: -50, yPercent: -50,
                    opacity: 0
                });
                container.appendChild(p);
                particles.push(p);
            }

            const animateParticle = (p) => {
                if (mainTimelinePaused) return;
                
                gsap.set(p, { x: 0, y: 0, opacity: 1, scale: 0.8, rotation: 0, rotationX: 0 });

                gsap.to(p, {
                    duration: gsap.utils.random(1, 2),
                    x: gsap.utils.random(-150, 150),
                    y: gsap.utils.random(-110, 110),
                    rotation: gsap.utils.random(180, 720), // Točení mince
                    rotationY: gsap.utils.random(180, 720), // 3D rotace
                    scale: gsap.utils.random(0.4, 1.2),
                    opacity: 0,
                    ease: "power1.out",
                    delay: gsap.utils.random(0, 1.5),
                    onComplete: () => animateParticle(p)
                });
            };

            const startStream = () => {
                mainTimelinePaused = false;
                particles.forEach(p => animateParticle(p));
            };

            const stopStream = () => {
                mainTimelinePaused = true;
                particles.forEach(p => gsap.to(p, { opacity: 0, duration: 0.5, overwrite: 'auto' }));
            };

            banner.addEventListener('mouseenter', () => {
                if (gsap.getProperty(ctaWrap, "opacity") > 0.5) startStream();
            });
            banner.addEventListener('mouseleave', stopStream);
            window.fizzyControls = { start: startStream, stop: stopStream };
        };

        initFizzyEffect();

        /* --- MAGNETIC & CORE BANNER LOGIC (NEZMĚNĚNO) --- */
        const MAGNETIC_RADIUS = 180;
        const MAGNETIC_MAX_PULL = 16;
        const magneticToX = gsap.quickTo(ctaWrap, 'x', { duration: 0.3, ease: 'power3.out' });
        const magneticToY = gsap.quickTo(ctaWrap, 'y', { duration: 0.3, ease: 'power3.out' });

        clickLayer.addEventListener('click', (e) => {
            e.preventDefault();
            window.open(window.clickTag || 'https://www.forbescasino.cz/', '_blank');
        });

        const resetMagnetic = () => { magneticToX(0); magneticToY(0); };
        banner.addEventListener('mousemove', (e) => {
            if (Number(gsap.getProperty(ctaWrap, 'opacity')) < 0.2) return;
            const rect = ctaButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const deltaX = e.clientX - centerX;
            const deltaY = e.clientY - centerY;
            const dist = Math.hypot(deltaX, deltaY);
            if (dist >= MAGNETIC_RADIUS) { resetMagnetic(); return; }
            const pull = (1 - dist / MAGNETIC_RADIUS);
            magneticToX((deltaX / MAGNETIC_RADIUS) * MAGNETIC_MAX_PULL * pull);
            magneticToY((deltaY / MAGNETIC_RADIUS) * MAGNETIC_MAX_PULL * pull);
        });
        banner.addEventListener('mouseleave', resetMagnetic);

        const resetLoopState = () => {
            banner.classList.add('shimmer-active');
            gsap.set('.deposit-image', { scale: 1, filter: 'drop-shadow(0 0 0px rgba(255, 215, 0, 0.99))' });
            gsap.set('.freespin-image', { scale: 0.08, opacity: 0, filter: 'drop-shadow(0 0 0px rgba(255, 215, 0, 0.99))' });
            gsap.set('.freespin-title, .deposit-group, .wheel-image, .wheel-title, .cta-wrap', { opacity: 0, scale: 0.08 });
            gsap.set('.freespin-letter, .deposit-letter, .wheel-letter', { y: 28, opacity: 0, rotateX: -90, filter: 'blur(6px)', transformPerspective: 400 });
            gsap.set('.logo', { width: 280, height: 103, left: '50%', top: '50%', xPercent: -50, yPercent: -50, rotation: 0, scale: 1, filter: 'brightness(0)' });
            gsap.set('.coin-generator', { autoAlpha: 1 });
            document.querySelectorAll('.coin--animated').forEach(c => { c.classList.remove('coin--animated'); void c.offsetWidth; c.classList.add('coin--animated'); });
        };

        resetLoopState();

        const scrubber = document.querySelector('.debug-scrubber');
        const currentTimeLabel = document.querySelector('.debug-current');
        const totalTimeLabel = document.querySelector('.debug-total');
        const toggleButton = document.querySelector('.debug-toggle');
        const tl = gsap.timeline({ delay: 0.6, repeat: -1 });

        tl.to('.logo', { duration: 0.7, width: 96, height: 36, left: 28, top: 20, xPercent: 0, yPercent: 0, rotation: -5, ease: "back.inOut(1.7)" }, '+=1.5')
        .to('.logo', { duration: 0.3, rotation: 0, ease: "power2.out" }, '-=0.2')
        .call(() => banner.classList.remove('shimmer-active'))
        .addLabel('scena1').set('.coin-generator', { autoAlpha: 0 }, 'scena1')
        .to('.freespin-image', { duration: 0.55, scale: 1, opacity: 1, transformOrigin: '50% 50%', ease: 'power2.out' }, 'scena1-=0.01')
        .set('.freespin-title', { opacity: 1 }, 'scena1')
        .to('.freespin-letter', { y: 0, opacity: 1, rotateX: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out', stagger: 0.045 }, 'scena1')
        .to('.freespin-image', { duration: 0.5, scale: 1.25, filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))', ease: 'back.out(1.5)' })
        .to('.freespin-image', { duration: 0.4, filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))', ease: 'power1.out' })
        .to('.freespin-image', { duration: 0.4, scale: 1, filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))', ease: 'elastic.out(1, 0.4)' })
        .to(['.freespin-image', '.freespin-title'], { duration: 0.5, scale: 0.08, opacity: 0, ease: 'power3.in' }, '+=.5')
        .addLabel('scena2')
        .to('.deposit-group', { duration: 0.55, scale: 1, opacity: 1, ease: 'power2.out' })
        .to('.deposit-letter', { y: 0, opacity: 1, rotateX: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out', stagger: 0.045 }, 'scena2')
        .to('.deposit-image', { duration: 0.5, scale: 1.25, filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))', ease: 'back.out(1.5)' })
        .to('.deposit-image', { duration: 0.4, filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.99)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))', ease: 'power1.out' })
        .to('.deposit-image', { duration: 0.6, scale: 1, ease: 'elastic.out(1, 0.4)' })
        .to(['.deposit-group'], { duration: 0.5, scale: 0.08, opacity: 0 })
        .addLabel('scena3')
        .to('.wheel-image', { duration: 0.55, scale: 1, opacity: 1, ease: 'power2.out' })
        .set('.wheel-title', { opacity: 1 }, '-=0.55')
        .to('.wheel-letter', { y: 0, opacity: 1, rotateX: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out', stagger: 0.045 }, '-=0.55')
        .to('.wheel-image', { duration: 0.4, scale: 1.25, filter: 'brightness(1.6) drop-shadow(0 0 20px rgba(255, 215, 0, 1))', ease: 'back.out(1.5)' }, '-=0.5')
        .to('.wheel-image', { duration: 0.4, filter: 'brightness(1.3) drop-shadow(0 0 35px rgba(255, 215, 0, 0.8)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.4))', ease: 'power1.out' })
        .to('.wheel-image', { duration: 0.6, scale: 1, filter: 'brightness(1) drop-shadow(0 0 8px rgba(255, 215, 0, 0.4))', ease: 'elastic.out(1, 0.4)' })
        .to(['.wheel-image', '.wheel-title'], { duration: 0.5, scale: 0.08, opacity: 0, ease: 'power3.in' }, '+=.5')
        .call(() => banner.classList.add('shimmer-active'))
        .addLabel('scena4')
        .to('.cta-wrap', { duration: 0.55, scale: 1, opacity: 1, ease: 'back.out(1.2)' })
        .addLabel('cta-visible').call(() => { if (debugPanel.classList.contains('active')) tl.pause(); })
        .call(() => { const b = document.querySelector('.cta-button'); b.classList.remove('sheen-run'); void b.offsetWidth; b.classList.add('sheen-run'); })
        .to({}, { duration: 3 })
        .to('.cta-wrap', { duration: 0.4, scale: 1.4, opacity: 0, ease: 'power2.in' })
        .to('.logo', { duration: 0.8, width: 280, height: 103, left: '50%', top: '50%', xPercent: -50, yPercent: -50, rotation: 360, filter: 'brightness(0)', ease: "back.out(1.5)" }, '-=0.2')
        .to('.logo', { duration: 0.2, ease: "power1.inOut" })
        .to('.logo', { duration: 0.2, scale: 1, ease: "power1.inOut" })
        .call(() => gsap.delayedCall(1, resetLoopState));

        const updateDebug = () => { scrubber.value = (tl.duration() === 0 ? 0 : (tl.time() / tl.duration()) * 1000); currentTimeLabel.textContent = tl.time().toFixed(2) + 's'; totalTimeLabel.textContent = tl.duration().toFixed(2) + 's'; };
        tl.eventCallback('onUpdate', updateDebug);
        scrubber.addEventListener('input', () => { tl.pause(); tl.progress(Number(scrubber.value) / 1000); updateDebug(); });
        toggleButton.addEventListener('click', () => { tl.paused() ? tl.play() : tl.pause(); toggleButton.textContent = tl.paused() ? 'Start' : 'Stop'; });
        document.querySelector('.debug-restart').addEventListener('click', () => { resetLoopState(); tl.restart(); });
        debugLaunch.addEventListener('click', () => {
            const e = !debugPanel.classList.contains('active');
            debugPanel.classList.toggle('active', e);
            debugLaunch.textContent = e ? 'Debug ON' : 'Debug OFF';
            if (e) { resetLoopState(); tl.seek('cta-visible', false); tl.pause(); resetMagnetic(); window.fizzyControls.stop(); } else { resetLoopState(); tl.restart(); }
        });
        variantButtons.forEach(b => b.addEventListener('click', () => applyCtaVariant(Number(b.dataset.ctaVariant))));
    </script>
