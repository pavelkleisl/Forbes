<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x Casino GSAP Masterclass</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; padding: 20px; background: #1a1a24;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- OVLÁDACÍ PANEL --- */
        .controls {
            width: 970px; display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; margin-bottom: 20px;
        }
        .controls button {
            padding: 12px; background: #2a2a35; color: #fff; border: 1px solid #444;
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .controls button:hover, .controls button.active {
            background: #facc15; color: #000; border-color: #facc15;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        /* --- UNIVERZÁLNÍ BANNER KONTEJNER --- */
        #banner {
            width: 970px; height: 250px; position: relative; overflow: hidden;
            background: #000; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 2px solid #333; perspective: 1200px; /* Připraveno pro 3D animace */
            cursor: pointer;
        }

        /* --- STAVEBNÍ BLOKY (manipulováno přes GSAP) --- */
        .bg-layer { position: absolute; inset: -20%; background: #111; z-index: 1; }
        
        .content-wrapper {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center;
            box-sizing: border-box; padding: 0 50px;
            transform-style: preserve-3d;
        }

        .text-1 { font-family: 'Oswald', sans-serif; font-size: 55px; font-weight: 700; line-height: 1; text-transform: uppercase; margin: 0; }
        .text-2 { font-size: 32px; font-weight: 800; color: #facc15; margin: 5px 0; line-height: 1.1; }
        .text-3 { font-size: 18px; color: #aaa; font-weight: 400; letter-spacing: 1px; }

        .cta-btn {
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
            padding: 15px 35px; background: #e11d48; color: #fff;
            border: none; border-radius: 4px; font-size: 18px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; z-index: 20;
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.4); pointer-events: none;
        }

        /* Plovoucí dekorační prvky */
        .decorations { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        .dec { position: absolute; font-size: 40px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); display: flex; align-items: center; justify-content: center;}
    </style>
</head>
<body>

    <div class="controls" id="btn-container"></div>

    <div id="banner">
        <div class="bg-layer" id="bg"></div>
        
        <div class="decorations">
            <div class="dec" id="d1"></div>
            <div class="dec" id="d2"></div>
            <div class="dec" id="d3"></div>
            <div class="dec" id="d4"></div>
            <div class="dec" id="d5"></div>
        </div>

        <div class="content-wrapper" id="content">
            <div class="text-1" id="t1">HLAVNÍ TEXT</div>
            <div class="text-2" id="t2">SEKUNDÁRNÍ TEXT</div>
            <div class="text-3" id="t3">Doplňující podtitulek dole</div>
        </div>

        <button class="cta-btn" id="cta">TLAČÍTKO</button>
    </div>

    <script>
        // 10 UNIKÁTNÍCH SCÉNÁŘŮ A JEJICH KONFIGURACE
        const variants = [
            {
                name: "1. Trezor (Clip-Path)", 
                t1: "ODEMKNI TREZOR", t2: "500 FREESPINŮ", t3: "Bonus čeká jen na tebe", cta: "ODEMKNOUT",
                bg: "radial-gradient(circle, #2d3748 0%, #000 80%)",
                items: ['🔒', '💰', '🔑', '💎', '💸']
            },
            {
                name: "2. Neon Cyberpunk", 
                t1: "CYBER JACKPOT", t2: "NOC NEKONČÍ", t3: "Hraj v neonovém světě", cta: "START",
                bg: "linear-gradient(45deg, #0f172a, #310541)",
                items: ['⚡', '🕹️', '🟣', '🔷', '✨']
            },
            {
                name: "3. Rozdání Karet", 
                t1: "KRÁLOVSKÁ HRA", t2: "LIVE BLACKJACK", t3: "Posaď se ke stolu", cta: "HRÁT LIVE",
                bg: "radial-gradient(circle, #064e3b 0%, #020617 100%)",
                items: ['🃏', '♠️', '♥️', '♦️', '♣️']
            },
            {
                name: "4. Srážka Textů", 
                t1: "MEGA", t2: "TURNAJ", t3: "Hrajeme o 1 000 000 Kč", cta: "VSTOUPIT",
                bg: "linear-gradient(90deg, #450a0a, #000)",
                items: ['💥', '🔥', '🏆', '🥊', '🥇']
            },
            {
                name: "5. Slot Automat", 
                t1: "ROZTOČ TO", t2: "CHYŤ 3 SCATTERY", t3: "Každý spin se počítá", cta: "TOČIT",
                bg: "radial-gradient(circle, #1e3a8a 0%, #000 100%)",
                items: ['🍒', '🍋', '🔔', '7️⃣', '🍉']
            },
            {
                name: "6. 3D Zlatá Mince", 
                t1: "ZLATO ČEKÁ", t2: "VIP BONUS", t3: "Získej 100% navíc k vkladu", cta: "ZÍSKAT",
                bg: "#0a0a0a",
                items: ['🪙', '🪙', '🪙', '🪙', '🪙']
            },
            {
                name: "7. Exploze Výhry", 
                t1: "JACKPOT PADL!", t2: "5 432 000 KČ", t3: "Další výherce můžeš být ty", cta: "ZKUSIT ŠTĚSTÍ",
                bg: "radial-gradient(circle, #7f1d1d 0%, #000 90%)",
                items: ['🎉', '🎊', '💸', '💰', '🎆']
            },
            {
                name: "8. Luxusní Fade", 
                t1: "PREMIUM CASINO", t2: "ELEGANCE A STYL", t3: "Zážitek na nejvyšší úrovni", cta: "VÍCE",
                bg: "linear-gradient(to right, #111, #222)",
                items: ['🥂', '🍾', '💎', '🎩', '✨']
            },
            {
                name: "9. Gravitační Pád", 
                t1: "TVRDÝ DOPAD", t2: "CASHBACK 20%", t3: "Vracíme ti peníze zpět", cta: "BRÁT",
                bg: "#050505",
                items: ['⬇️', '🧱', '💸', '⚓', '📉']
            },
            {
                name: "10. Kužel Světla", 
                t1: "TAJEMNÁ VÝHRA", t2: "MYSTERY DROP", t3: "Odhal, co se skrývá ve tmě", cta: "ODHALIT",
                bg: "#000",
                items: ['🔦', '👀', '❓', '🕵️', '🔮']
            }
        ];

        // Výběr DOM elementů
        const els = {
            banner: document.getElementById('banner'), bg: document.getElementById('bg'),
            content: document.getElementById('content'), t1: document.getElementById('t1'),
            t2: document.getElementById('t2'), t3: document.getElementById('t3'),
            cta: document.getElementById('cta'), decs: document.querySelectorAll('.dec')
        };

        let masterTl = gsap.timeline();

        // Generování tlačítek
        const btnContainer = document.getElementById('btn-container');
        variants.forEach((v, i) => {
            const btn = document.createElement('button');
            btn.innerText = v.name.split(' ')[0] + " " + v.name.split(' ')[1]; // Zkrácený název
            btn.onclick = () => playVariant(i);
            if(i===0) btn.classList.add('active');
            btnContainer.appendChild(btn);
        });

        function playVariant(index) {
            // Update UI
            document.querySelectorAll('.controls button').forEach((b, i) => b.classList.toggle('active', i === index));
            
            const v = variants[index];
            
            // 1. Zastavit vše a vyčistit in-line styly
            masterTl.clear();
            gsap.killTweensOf("*");
            gsap.set([els.bg, els.content, els.t1, els.t2, els.t3, els.cta, els.decs], {clearProps: "all"});
            
            // 2. Nastavit obsah a základní styly pro vybranou variantu
            els.t1.innerText = v.t1; els.t2.innerText = v.t2; els.t3.innerText = v.t3; els.cta.innerText = v.cta;
            els.bg.style.background = v.bg;
            els.decs.forEach((dec, i) => dec.innerText = v.items[i]);
            
            // Barvy textů reset (některé varianty si je změní)
            gsap.set(els.t1, { color: "#fff" });
            gsap.set(els.t2, { color: "#facc15" });

            // 3. VYTVOŘENÍ SPECIFICKÉ ANIMACE PRO KAŽDOU VARIANTU
            if(index === 0) {
                // V1: Trezor (Kruhová maska se zvětšuje ze středu)
                gsap.set(els.bg, { clipPath: "circle(0% at 50% 50%)" });
                gsap.set([els.t1, els.t2, els.t3, els.cta], { autoAlpha: 0, y: 30 });
                gsap.set(els.decs, { autoAlpha: 0, scale: 0, left: "50%", top: "50%" });

                masterTl.to(els.bg, { duration: 1.5, clipPath: "circle(100% at 50% 50%)", ease: "power2.inOut" })
                        .to(els.decs, { duration: 1, autoAlpha: 1, scale: 1, 
                            x: () => gsap.utils.random(-400, 400), y: () => gsap.utils.random(-100, 100), 
                            rotation: () => gsap.utils.random(-180, 180), ease: "back.out(1.5)" }, "-=0.5")
                        .to([els.t1, els.t2, els.t3], { duration: 0.8, autoAlpha: 1, y: 0, stagger: 0.1, ease: "power2.out" }, "-=0.8")
                        .to(els.cta, { duration: 0.5, autoAlpha: 1, y: 0, ease: "back.out(2)" });

            } else if (index === 1) {
                // V2: Neon Cyberpunk (Pulzování, rozmazání, divoké barvy)
                gsap.set(els.t1, { color: "#0ea5e9", textShadow: "0 0 20px #0ea5e9" });
                gsap.set(els.t2, { color: "#e879f9", textShadow: "0 0 20px #e879f9" });
                gsap.set(els.cta, { background: "#0ea5e9" });
                gsap.set(els.content, { scale: 2, filter: "blur(20px)", autoAlpha: 0 });
                
                masterTl.to(els.content, { duration: 1.2, scale: 1, filter: "blur(0px)", autoAlpha: 1, ease: "expo.out" })
                        .from(els.cta, { duration: 0.5, scale: 0, ease: "back.out(2)" }, "-=0.5")
                        // Neonové probliknutí
                        .to(els.t1, { opacity: 0.5, duration: 0.05, repeat: 5, yoyo: true }, "-=0.2");

            } else if (index === 2) {
                // V3: Rozdání karet (Dekorace letí jako rozdané karty z rohu)
                gsap.set([els.t1, els.t2, els.t3, els.cta], { x: -100, autoAlpha: 0 });
                gsap.set(els.decs, { x: 800, y: 300, rotation: 90, scale: 0.5 }); // Mimo obrazovku vpravo dole

                masterTl.to(els.decs, { duration: 1, x: (i) => 400 + (i * 80), y: (i) => 50 + Math.abs(i-2)*20, 
                                        rotation: (i) => -20 + (i*10), scale: 1.5, stagger: 0.1, ease: "power3.out" })
                        .to([els.t1, els.t2, els.t3], { duration: 0.8, x: 0, autoAlpha: 1, stagger: 0.1, ease: "back.out(1.5)" }, "-=0.8")
                        .to(els.cta, { duration: 0.5, x: 0, autoAlpha: 1 }, "-=0.5");

            } else if (index === 3) {
                // V4: Srážka (Těžká kolize textů ze stran)
                gsap.set(els.t1, { x: -600 });
                gsap.set(els.t2, { x: 600 });
                gsap.set([els.t3, els.cta, els.decs], { autoAlpha: 0 });

                masterTl.to(els.t1, { duration: 0.8, x: 0, ease: "bounce.out" })
                        .to(els.t2, { duration: 0.8, x: 0, ease: "bounce.out" }, "<")
                        // Třes obrazovky při nárazu
                        .to(els.banner, { duration: 0.3, x: 10, y: -5, yoyo: true, repeat: 3, ease: "rough" }, "-=0.2")
                        .to([els.t3, els.cta], { duration: 0.5, autoAlpha: 1, ease: "power1.inOut" })
                        // Jiskry po nárazu
                        .to(els.decs, { duration: 0.8, autoAlpha: 1, x: () => gsap.utils.random(100, 800), y: () => gsap.utils.random(20, 200), rotation: 360, ease: "power2.out" }, "-=0.5");

            } else if (index === 4) {
                // V5: Slot Automat (Texty rotují vertikálně dolů jako válce)
                gsap.set(els.content, { y: -300 }); // Vše začíná nahoře
                gsap.set(els.decs, { y: -200, x: (i) => 100 + (i*150) }); // Ikony v řadě
                gsap.set(els.cta, { autoAlpha: 0, scale: 0 });

                masterTl.to(els.decs, { duration: 1.5, y: 100, stagger: 0.1, ease: "back.out(1.2)" })
                        // Točení symbolů - simulace
                        .to(els.decs, { duration: 0.5, rotationX: 360, repeat: 1, ease: "none" }, "-=1")
                        .to(els.content, { duration: 1, y: 0, ease: "bounce.out" }, "-=0.5")
                        .to(els.cta, { duration: 0.5, autoAlpha: 1, scale: 1, ease: "elastic.out(1, 0.5)" });

            } else if (index === 5) {
                // V6: 3D Zlatá Mince (Celý kontejner se přetočí v 3D prostoru)
                gsap.set(els.content, { rotationX: 90, transformOrigin: "center center", autoAlpha: 0 });
                gsap.set(els.t2, { color: "#d4af37" }); // Prémiová zlatá
                gsap.set(els.cta, { background: "linear-gradient(90deg, #d4af37, #aa8529)" });
                gsap.set(els.decs, { autoAlpha: 0, scale: 2 });

                masterTl.to(els.content, { duration: 1.5, rotationX: 0, autoAlpha: 1, ease: "back.out(1.2)" })
                        .to(els.decs, { duration: 1, autoAlpha: 1, scale: 1, x: () => gsap.utils.random(500, 800), y: () => gsap.utils.random(20, 200), stagger: 0.1, ease: "power2.out" }, "-=1")
                        .from(els.cta, { duration: 0.8, x: 100, autoAlpha: 0, ease: "power3.out" }, "-=0.5");

            } else if (index === 6) {
                // V7: Exploze Jackpotu (Vše vyletí ze středu extrémní rychlostí)
                gsap.set(els.content, { scale: 0, autoAlpha: 0 });
                gsap.set(els.cta, { scale: 0 });
                gsap.set(els.decs, { left: "50%", top: "50%", scale: 0 });

                masterTl.to(els.content, { duration: 1, scale: 1, autoAlpha: 1, ease: "elastic.out(1, 0.4)" })
                        // Extrémní rozlet dekorací do všech stran
                        .to(els.decs, { duration: 1.5, scale: 2, autoAlpha: 1, 
                            x: (i) => Math.cos(i) * gsap.utils.random(300, 500), 
                            y: (i) => Math.sin(i) * gsap.utils.random(100, 200), 
                            rotation: 720, ease: "power4.out" }, "-=0.8")
                        .to(els.cta, { duration: 0.5, scale: 1, ease: "back.out(2)" }, "-=1");

            } else if (index === 7) {
                // V8: Luxusní Fade (Velmi pomalé, elegantní, zoom in)
                gsap.set(els.bg, { scale: 1.5 }); // Pomalý odzoom pozadí
                gsap.set([els.t1, els.t2, els.t3], { autoAlpha: 0, y: 10 });
                gsap.set(els.cta, { autoAlpha: 0, background: "#fff", color: "#000" });
                gsap.set(els.decs, { autoAlpha: 0 });

                masterTl.to(els.bg, { duration: 4, scale: 1, ease: "power1.out" })
                        .to([els.t1, els.t2, els.t3], { duration: 1.5, autoAlpha: 1, y: 0, stagger: 0.3, ease: "power2.out" }, "-=3.5")
                        .to(els.decs, { duration: 2, autoAlpha: 0.5, y: -20, stagger: 0.2, x: (i) => 500 + (i*80), ease: "sine.inOut" }, "-=3")
                        .to(els.cta, { duration: 1, autoAlpha: 1 }, "-=2.5");

            } else if (index === 8) {
                // V9: Gravitační Pád (Prvky padají s těžkou vahou a odráží se)
                gsap.set([els.t1, els.t2, els.t3], { y: -250 }); // Vysoko nahoře
                gsap.set(els.cta, { y: 250 }); // Dole
                gsap.set(els.decs, { y: -300, x: (i) => gsap.utils.random(100, 800) });

                masterTl.to([els.t1, els.t2, els.t3], { duration: 1.2, y: 0, stagger: 0.1, ease: "bounce.out" })
                        .to(els.decs, { duration: 1.5, y: (i) => gsap.utils.random(20, 200), stagger: 0.1, ease: "bounce.out" }, "-=1")
                        .to(els.cta, { duration: 0.8, y: 0, ease: "power3.out" }, "-=0.5");

            } else if (index === 9) {
                // V10: Kužel světla (Maska, která jezdí přes obsah)
                // Použijeme clip-path na content wrapper pro simulaci světla
                gsap.set(els.content, { clipPath: "circle(0% at 0% 50%)" }); 
                gsap.set(els.cta, { autoAlpha: 0 });
                gsap.set(els.decs, { autoAlpha: 0 });

                masterTl.to(els.content, { duration: 1.5, clipPath: "circle(30% at 50% 50%)", ease: "power2.inOut" })
                        .to(els.content, { duration: 1, clipPath: "circle(150% at 50% 50%)", ease: "power2.in" }) // Plné rozsvícení
                        .to(els.decs, { duration: 0.5, autoAlpha: 1, stagger: 0.1, x: (i) => gsap.utils.random(300, 800), y: (i) => gsap.utils.random(20, 200) }, "-=0.5")
                        .to(els.cta, { duration: 0.5, autoAlpha: 1, x: -20, ease: "power2.out" });
            }
        }

        // Spustit první variantu po načtení
        playVariant(0);

        // Hover efekt na banner
        els.banner.addEventListener('mouseenter', () => {
            gsap.to(els.cta, { scale: 1.05, duration: 0.2 });
        });
        els.banner.addEventListener('mouseleave', () => {
            gsap.to(els.cta, { scale: 1, duration: 0.2 });
        });

    </script>
</body>
</html>
