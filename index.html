<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes Menu Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset a základní rozvržení */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rubik', sans-serif;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617;
        }

        /* Iframe přes celou obrazovku */
        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Fixovaný spodní panel s přepínačem */
        .presentation-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 100px;
            display: flex;
            gap: 8px;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.1) inset;
            z-index: 99999;
        }

        .bar-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 0 12px 0 8px;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Styly pro tlačíka variant */
        .variant-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid transparent;
            padding: 10px 20px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .variant-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Aktivní stav - Forbes Žlutá */
        .variant-btn.active {
            background: #ffbe00;
            color: #020617;
            box-shadow: 0 4px 12px rgba(255, 190, 0, 0.3);
        }
    </style>
</head>
<body>

    <iframe id="preview-frame" src="var1.html"></iframe>

    <div class="presentation-bar">
        <span class="bar-title">Variants</span>
        <button class="variant-btn active" onclick="loadVariant('var1.html', this)">1</button>
        <button class="variant-btn" onclick="loadVariant('var2.html', this)">2</button>
        <button class="variant-btn" onclick="loadVariant('var3.html', this)">3</button>
        <button class="variant-btn" onclick="loadVariant('var4.html', this)">4</button>
        <button class="variant-btn" onclick="loadVariant('var5.html', this)">5</button>
        <button class="variant-btn" onclick="loadVariant('var6.html', this)">6</button>
        <button class="variant-btn" onclick="loadVariant('var7.html', this)">7</button>
    </div>

    <script>
        function loadVariant(url, buttonElement) {
            // 1. Změníme zdroj iFramu na požadovaný soubor
            document.getElementById('preview-frame').src = url;

            // 2. Odstraníme aktivní třídu ze všech tlačítek
            document.querySelectorAll('.variant-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 3. Přidáme aktivní třídu na kliknuté tlačítko
            buttonElement.classList.add('active');
        }
    </script>

</body>
</html>
