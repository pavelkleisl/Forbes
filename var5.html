<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes - Varianta 3 (Glow Switcher)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #03091e; color: #fff; }

        .header-container {
            background-color: #070f26;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 80px;
            border-bottom: 1px solid #1a2342;
        }

        .brand-block { display: flex; align-items: center; gap: 30px; height: 100%; }
        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; color: #fff;}

        /* Hlavní rozcestník jako pilíře */
        .main-hubs { display: flex; height: 100%; }
        .hub-link {
            display: flex;
            align-items: center;
            padding: 0 25px;
            color: #64748b;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
            height: 100%;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .hub-link:hover { color: #fff; }
        
        /* Aktivní stavy s neon/glow efektem */
        .hub-link.casino-active {
            color: #ffb703;
            border-bottom-color: #ffb703;
            background: linear-gradient(to bottom, transparent, rgba(255, 183, 3, 0.05));
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.3);
        }
        .hub-link.sport-active {
            color: #00f5ff;
            border-bottom-color: #00f5ff;
            background: linear-gradient(to bottom, transparent, rgba(0, 245, 255, 0.05));
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
        }

        /* Podmenu integrované uprostřed */
        .sub-navigation { display: flex; list-style: none; gap: 10px; }
        .sub-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .sub-link:hover { color: #fff; background-color: #131c38; }

        /* Pravá strana: Login/Reg */
        .auth-block { display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-in { color: #fff; background: transparent; }
        .btn-reg { background-color: #ffb703; color: #000; }
    </style>
</head>
<body>

    <div class="header-container">
        
        <div class="brand-block">
            <div class="logo">Forbes</div>
            
            <nav class="main-hubs">
                <a href="#" class="hub-link casino-active">🎰 Casino</a>
                <a href="#" class="hub-link">⚽ Sport</a>
            </nav>
        </div>

        <nav>
            <ul class="sub-navigation">
                <li><a href="#" class="sub-link">Bonusy</a></li>
                <li><a href="#" class="sub-link">Turnaje</a></li>
                <li><a href="#" class="sub-link">Věrnostní systém</a></li>
                <li><a href="#" class="sub-link">Podpora</a></li>
            </ul>
        </nav>

        <div class="auth-block">
            <a class="btn btn-in">Přihlášení</a>
            <a class="btn btn-reg">Registrace</a>
        </div>

    </div>

</body>
</html>
