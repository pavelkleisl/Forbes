<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbes - Tipsport Style Upravený</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rubik', sans-serif; }
        
        header { width: 100%; }
        body {
            background-color: #b1bac5;
        }
        /* HORNÍ PATRO: Tmavé vesmírné pozadí */
        .top-deck {
            background: url('https://www.forbescasino.cz/assets/img/welcome-bg.jpg') no-repeat center top;
            background-size: cover;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 70px;
        }
        
        .left-brand-zone { display: flex; align-items: center; gap: 35px; }
        .logo img { height: 45px; display: block; }

        .main-products-nav { display: flex; gap: 8px; list-style: none; }
        .product-item a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        /* Aktivní produkt (nyní defaultně Sportovní sázení) */
        .product-item.active a {
            background-color: #ffbe00;
            color: #03091e;
        }

        .auth-zone { display: flex; align-items: center; gap: 15px; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 28px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
        }
        .btn-login { background-color: #ffffff; color: #03091e; }
        
        /* Úprava 5: Registrace je nyní plně žlutá jako na vašem webu */
        .btn-register { background-color: #ffbe00; color: #03091e; }


        /* SPODNÍ PATRO: Kontrastní světlé */
        .bottom-deck {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 52px; /* Mírně zvětšeno pro lepší prostor kolem podsvíceného bloku */
        }

        .submenu-nav { display: flex; list-style: none; gap: 2px; height: 52px; align-items: stretch; }
        .submenu-item { display: flex; align-items: stretch; }

        .submenu-item a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 0 18px;
            display: flex;
            align-items: center;
            border-top: 3px solid transparent;
            transition: all 0.15s ease;
        }

        .submenu-item:hover a {
            color: #0f172a;
            border-top-color: #c0ccdc;
        }

        .submenu-item.active a {
            color: #0f172a;
            font-weight: 700;
            border-top-color: #ffbe00;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <header>
        <div class="top-deck">
            <div class="left-brand-zone">
                <a href="#" class="logo">
                    <img src="https://www.forbescasino.cz/assets/img/logo.svg" alt="Forbes">
                </a>
                <nav>
                    <ul class="main-products-nav">
                        <li class="product-item active"><a href="#">Sportovní sázení</a></li>
                        <li class="product-item"><a href="#">Casino</a></li>
                    </ul>
                </nav>
            </div>
            <div class="auth-zone">
                <a href="#" class="btn btn-login">Přihlásit se</a>
                <a href="#" class="btn btn-register">Registrace</a>
            </div>
        </div>

        <div class="bottom-deck">
            <nav>
                <ul class="submenu-nav">
                    <li class="submenu-item active"><a href="#">Kurzy</a></li>
                    <li class="submenu-item"><a href="#">Live</a></li>
                    <li class="submenu-item"><a href="#">Výsledky</a></li>
                    <li class="submenu-item"><a href="#">Komunita</a></li>
                    <li class="submenu-item"><a href="#">Soutěže</a></li>
                    <li class="submenu-item"><a href="#">Bonusy</a></li>
                </ul>
            </nav>
            
            </div>
    </header>

</body>
</html>
