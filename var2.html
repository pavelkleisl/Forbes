<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid Ribbon Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rubik', sans-serif; }
        
        header { 
            background: url('https://www.forbescasino.cz/assets/img/welcome-bg.jpg') no-repeat center top;
        }

        body {
            background-color: #96989e;
        }

        /* Společná prémiová nadhlavička */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; height: 75px;
            background: rgba(2, 6, 23, 0.4); backdrop-filter: blur(10px);
        }
        .left-zone { display: flex; align-items: center; gap: 40px; }
        .logo img { height: 44px; display: block; }
        
        .hub-nav { display: flex; gap: 10px; list-style: none; }
        .hub-nav a { 
            color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; 
            padding: 8px 22px; border-radius: 20px; transition: all 0.2s;
        }
        .hub-nav .active a { background-color: #ffbe00; color: #020617; }

        .auth-zone { display: flex; gap: 15px; }
        .btn { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 20px;
            border-radius: 21px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none;
        }
        .btn-login { background: #fff; color: #020617; }
        .btn-register { background: #ffbe00; color: #020617; }

        /* ==========================================================================
           BENTO GRID RIBBON (SUBMENU)
           ========================================================================== */
        .bento-strip {
            padding: 15px 40px;
            background: linear-gradient(to bottom, rgba(2,6,23,0.4), transparent);
        }

        .bento-menu {
            display: flex;
            list-style: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 6px;
            gap: 4px;
            max-width: max-content;
            backdrop-filter: blur(8px);
        }

        .bento-item a {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 26px;
            border-radius: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        /* Hover stav: Dlaždice se jemně prosvítí zevnitř */
        .bento-item:hover a {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* Aktivní stav: Luxusní neon-sklo efekt zbarvený do vaší žluté */
        .bento-item.active a {
            color: #ffbe00;
            background: linear-gradient(180deg, rgba(255, 190, 0, 0.12) 0%, rgba(255, 190, 0, 0.02) 100%);
            border-color: rgba(255, 190, 0, 0.3);
            box-shadow: 0 4px 20px rgba(255, 190, 0, 0.05);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="left-zone">
                <a href="#" class="logo"><img src="https://www.forbescasino.cz/assets/img/logo.svg" alt="Forbes"></a>
                <ul class="hub-nav">
                    <li class="active"><a href="#">Sportovní sázení</a></li>
                    <li><a href="#">Casino</a></li>
                </ul>
            </div>
            <div class="auth-zone">
                <a href="#" class="btn btn-login">Přihlásit se</a>
                <a href="#" class="btn btn-register">Registrace</a>
            </div>
        </div>

        <div class="bento-strip">
            <nav>
                <ul class="bento-menu">
                    <li class="bento-item active"><a href="#">Kurzy</a></li>
                    <li class="bento-item"><a href="#">Live</a></li>
                    <li class="bento-item"><a href="#">Výsledky</a></li>
                    <li class="bento-item"><a href="#">Komunita</a></li>
                    <li class="bento-item"><a href="#">Soutěže</a></li>
                    <li class="bento-item"><a href="#">Bonusy</a></li>
                </ul>
            </nav>
        </div>
    </header>

</body>
</html>
