<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept: Cyber Line Trace</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rubik', sans-serif; }
        header { 
            background: #020512 url('https://www.forbescasino.cz/assets/img/welcome-bg.jpg') no-repeat center top;
        }

        body {
            background-color: #96989e;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 75px; }
        .left-zone { display: flex; align-items: center; gap: 40px; }
        .logo img { height: 44px; display: block; }
        .hub-nav { display: flex; gap: 10px; list-style: none; }
        .hub-nav a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; padding: 8px 22px; border-radius: 20px; }
        .hub-nav .active a { background-color: #ffbe00; color: #020617; }
        .auth-zone { display: flex; gap: 15px; }
        .btn { display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 20px;
            border-radius: 21px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none; }
        .btn-login { background: #fff; color: #020617; }
        .btn-register { background: #ffbe00; color: #020617; }

        /* ==========================================================================
           CYBER LINE TRACE (SUBMENU)
           ========================================================================== */
        .trace-deck {
            margin-top: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18); /* Nekonečná tenká linka */
            position: relative;
        }

        .trace-menu {
            display: flex;
            list-style: none;
            padding: 0 40px;
            gap: 10px;
        }

        .trace-item {
            position: relative;
            padding-bottom: 15px; /* Vytváří ideální mezeru nad linkou */
        }

        .trace-item a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            transition: all 0.25s ease;
        }

        /* Hover stav prosvětlí text */
        .trace-item:hover a {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Aktivní stav rozsvítí spodní linku jako laser a aktivuje křížek */
        .trace-item.active a {
            color: #ffbe00;
            font-weight: 700;
        }
        .trace-item.active::before {
            opacity: 1;
            top: -6px;
        }

        /* Lokální intenzivní podsvícení linky pod aktivním prvkem */
        .trace-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 100%; height: 2px;
            background: #ffbe00;
            box-shadow: 0 0 12px #ffbe00;
        }
    </style>
</head>
<body>

    <header class="trace-header">
        <div class="top-bar">
            <div class="left-zone">
                <a href="#" class="logo"><img src="https://www.forbescasino.cz/assets/img/logo.svg" alt="Forbes"></a>
                <ul class="hub-nav">
                    <li class="active"><a href="#">Sportovní sázení</a></li>
                    <li><a href="#">Casino</a></li>
                </ul>
            </div>
            <div class="auth-zone">
                <a href="#" class="btn btn-login">Přihlásit se</a>
                <a href="#" class="btn btn-register">Registrace</a>
            </div>
        </div>

        <div class="trace-deck">
            <nav>
                <ul class="trace-menu">
                    <li class="trace-item active"><a href="#">Kurzy</a></li>
                    <li class="trace-item"><a href="#">Live</a></li>
                    <li class="trace-item"><a href="#">Výsledky</a></li>
                    <li class="trace-item"><a href="#">Komunita</a></li>
                    <li class="trace-item"><a href="#">Soutěže</a></li>
                    <li class="trace-item"><a href="#">Bonusy</a></li>
                </ul>
            </nav>
        </div>
    </header>

</body>
</html>
