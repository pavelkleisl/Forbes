<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submenu - Varianta A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rubik', sans-serif; }
        
        /* Horní patro zůstává beze změny, obrázek se načítá lokálně */
        .top-deck {
            background: url('bg.jpg') no-repeat center top;
            background-size: cover;
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 70px;
        }
        .left-brand-zone { display: flex; align-items: center; gap: 35px; }
        .logo img { height: 45px; display: block; }
        
        /* Hlavní navigace a její prémiový hover */
        .main-products-nav { display: flex; gap: 8px; list-style: none; }
        .product-item a { 
            color: rgba(255, 255, 255, 0.7); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 700; 
            padding: 8px 20px; 
            border-radius: 20px;
            transition: all 0.25s ease;
        }
        
        /* Decentní podbarvení při najetí myší na hlavní taby */
        .product-item:not(.active) a:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .product-item.active a { background-color: #ffbe00; color: #03091e; }
        
        .auth-zone { display: flex; align-items: center; gap: 15px; }
        .btn { display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 20px;
            border-radius: 21px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none; }
        .btn-login { background-color: #ffffff; color: #03091e; }
        .btn-register { background-color: #ffbe00; color: #03091e; }

        /* ==========================================================================
           NOVÉ SUBMENU: VARIANTA A (Inverted Tech Pill)
           ========================================================================== */
        .bottom-deck {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            height: 54px;
        }

        .submenu-nav { 
            display: flex; 
            list-style: none; 
            gap: 6px; 
            align-items: center; 
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }

        /* Třída pro plynulé skrytí submenu při přepínání */
        .submenu-nav.fade-out {
            opacity: 0;
        }
        
        .submenu-item a {
            color: #64748b; /* Příjemná, moderní břidlicová šedá pro neaktivní linky */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500; /* Jemnější tloušťka */
            padding: 8px 18px;
            border-radius: 20px; /* Plná pilulka */
            transition: all 0.2s ease-in-out;
        }
        
        /* Hover stav: Velmi decentní podbarvení */
        .submenu-item:hover a {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* Aktivní stav: Kontrastní tmavá pilulka s vaší žlutou */
        .submenu-item.active a {
            background-color: #03091e; /* Tmavá barva z vašeho brandu */
            color: #ffbe00; /* Vaše jasná žlutá */
        }
    </style>
</head>
<body>

    <header>
        <div class="top-deck">
            <div class="left-brand-zone">
                <a href="#" class="logo"><img src="logo.svg" alt="Forbes"></a>
                <nav>
                    <ul class="main-products-nav">
                        <li class="product-item active" id="tabSport"><a href="#" onclick="switchTo('sport', event)">Sportovní sázení</a></li>
                        <li class="product-item" id="tabCasino"><a href="#" onclick="switchTo('casino', event)">Casino</a></li>
                    </ul>
                </nav>
            </div>
            <div class="auth-zone">
                <a href="#" class="btn btn-login">Přihlásit se</a>
                <a href="#" class="btn btn-register">Registrace</a>
            </div>
        </div>

        <div class="bottom-deck">
            <nav>
                <ul class="submenu-nav" id="submenuNav">
                    </ul>
            </nav>
        </div>
    </header>

    <script>
        // Data ze vzorové stránky
        const menus = {
            casino: [
                { label: 'Domů' },
                { label: 'Bonusy' },
                { label: 'Levelovací systém' },
                { label: 'Cashback' },
                { label: 'Turnaje' },
                { label: 'Blog' },
            ],
            sport: [
                { label: 'Domů' },
                { label: 'Živě' },
                { label: 'Soutěže' },
                { label: 'Bonusy' },
            ],
        };

        let activeProduct = 'sport';

        // Vykreslení tech-pill prvků v bílé liště
        function renderMenu(product) {
            const menuEl = document.getElementById('submenuNav');
            menuEl.innerHTML = menus[product].map((item, i) => {
                return `<li class="submenu-item${i === 0 ? ' active' : ''}">
                        <a href="#" onclick="activateItem(this, event)">${item.label}</a>
                    </li>`;
            }).join('');
        }

        // Aktivace položky uvnitř bílého submenu (překlik na Živě, Turnaje atd.)
        function activateItem(el, e) {
            e.preventDefault();
            document.querySelectorAll('#submenuNav .submenu-item').forEach(li => li.classList.remove('active'));
            el.closest('.submenu-item').classList.add('active');
        }

        // Hlavní switch mezi Sportem a Casinem
        function switchTo(product, e) {
            if (e) e.preventDefault();
            if (product === activeProduct) return;
            activeProduct = product;

            // Změna active třídy v horním panelu
            document.getElementById('tabSport').classList.toggle('active', product === 'sport');
            document.getElementById('tabCasino').classList.toggle('active', product === 'casino');

            // Hladký přechod (fade-out, změna obsahu, fade-in)
            const menuEl = document.getElementById('submenuNav');
            menuEl.classList.add('fade-out');
            
            setTimeout(() => {
                renderMenu(product);
                menuEl.classList.remove('fade-out');
            }, 200);
        }

        // První start a naplnění menu
        renderMenu('sport');
    </script>

</body>
</html>
